<html lang="tr">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --primary-color: #009c3b;
            --primary-dark: #007a2e;
            --secondary-color: #ffdf00;
            --accent-color: #002776;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 40px 30px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "🇧🇷";
            font-size: 150px;
            position: absolute;
            right: 20px;
            bottom: -30px;
            opacity: 0.1;
            pointer-events: none;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: fadeInUp 0.6s ease;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Selector Container */
        .selector-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .selector-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .selector-card:hover {
            transform: translateY(-3px);
        }

        .selector-card label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 0.95em;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: var(--transition);
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Grid Systems */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: var(--primary-color);
            margin-bottom: 18px;
            border-left: 4px solid var(--secondary-color);
            padding-left: 15px;
            font-size: 1.3em;
        }

        /* Weather Card */
        .weather-card {
            text-align: center;
        }

        .weather-icon {
            font-size: 4em;
            margin: 15px 0;
        }

        .weather-temp {
            font-size: 3.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        /* List Items */
        .list-item {
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        [data-theme="dark"] .list-item {
            border-bottom-color: rgba(255,255,255,0.1);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background: rgba(0,156,59,0.05);
            padding-left: 18px;
        }

        /* Phone Numbers */
        .phone-number {
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Comment Form */
        .comment-form input,
        .comment-form textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        button {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: var(--transition);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,156,59,0.4);
        }

        /* Search Box */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-cultural { background: #9b59b6; color: white; }
        .badge-natureza { background: #27ae60; color: white; }
        .badge-praia { background: #3498db; color: white; }
        .badge-mirante { background: #f39c12; color: white; }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-color);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 26px;
            box-shadow: var(--shadow);
            z-index: 1000;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Language Selector */
        .lang-selector {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-card);
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .lang-selector button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50px;
            transition: var(--transition);
        }

        .lang-selector button:hover {
            background: rgba(0,156,59,0.2);
            transform: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.6em;
            }
            
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
            
            .lang-selector, .theme-toggle {
                bottom: 15px;
            }
        }

        /* Clock */
        #clock {
            font-size: 2.5em;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid rgba(0,156,59,0.2);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

                subtitle: "All states, cities and districts",
                select_state: "🏛️ State",
                select_city: "🏙️ City",
                search_district: "🔍 Search Neighborhood/District",
                neighborhoods: "🏘️ Neighborhoods & Districts",
                weather: "🌤️ Weather Now",
                local_time: "🕐 Local Time",
                timezone: "Time Zone",
                announcements: "📢 Latest News",
                important_phones: "📞 Important Numbers",
                transport: "🚌 Public Transport",
                tourist_guide: "🗺️ Tourist Guide",
                restaurants: "🍽️ Recommended Restaurants",
                comments: "💬 Visitor Comments",
                send_comment: "Send Comment",
                events: "📅 Upcoming Events",
                statistics: "📊 City Data"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.innerHTML = translations[lang][key];
                    }
                }
            });
            updatePageContent();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function updateClock() {
            const now = new Date();
            now.setHours(now.getUTCHours() - 3);
            document.getElementById('clock').innerHTML = now.toLocaleTimeString('pt-BR');
            document.getElementById('date').innerHTML = now.toLocaleDateString('pt-BR', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function getWeather(cidade) {
            const condicoes = ["☀️ Ensolarado", "⛅ Parcialmente Nublado", "☁️ Nublado", "🌧️ Chuvoso", "⛈️ Tempestade", "🌤️ Poucas Nuvens"];
            const condicao = condicoes[Math.floor(Math.random() * condicoes.length)];
            const temperatura = Math.floor(Math.random() * (38 - 15 + 1) + 15);
            const umidade = Math.floor(Math.random() * (90 - 40 + 1) + 40);
            const vento = Math.floor(Math.random() * 36);
            
            return { condicao, temperatura, umidade, vento };
        }

        let currentEstado = "SP";
        let currentCidade = "São Paulo";

        function changeEstado() {
            currentEstado = document.getElementById('estado-select').value;
            const cidades = cidadesPorEstado[currentEstado];
            const cidadeSelect = document.getElementById('cidade-select');
            cidadeSelect.innerHTML = cidades.map(c => `<option value="${c}">${c}</option>`).join('');
            currentCidade = cidades[0];
            updatePageContent();
        }

        function changeCidade() {
            currentCidade = document.getElementById('cidade-select').value;
            updatePageContent();
        }

        function filterBairros() {
            const search = document.getElementById('bairro-search').value.toLowerCase();
            const items = document.querySelectorAll('#bairros-list .list-item');
            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(search)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function filterTurismo() {
            const search = document.getElementById('turismo-search').value.toLowerCase();
            const items = document.querySelectorAll('#turismo-list .list-item');
            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(search)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function addComment() {
            const nome = document.getElementById('comment-name').value;
            const mensagem = document.getElementById('comment-msg').value;
            
            if (!nome || !mensagem) {
                alert(currentLang === 'pt' ? 'Preencha nome e mensagem!' : 
                      currentLang === 'tr' ? 'İsim ve mesaj girin!' : 'Fill name and message!');
                return;
            }
            
            comentarios.unshift({
                nome: nome,
                mensagem: mensagem,
                cidade: currentCidade,
                data: new Date().toLocaleDateString('pt-BR')
            });
            
            if (comentarios.length > 30) comentarios.pop();
            localStorage.setItem('comentarios', JSON.stringify(comentarios));
            
            document.getElementById('comment-name').value = '';
            document.getElementById('comment-msg').value = '';
            updateComments();
        }

        function updateComments() {
            const container = document.getElementById('comments-list');
            const cidadeComentarios = comentarios.filter(c => c.cidade === currentCidade);
            
            if (cidadeComentarios.length === 0) {
                container.innerHTML = '<div class="list-item" style="justify-content:center; color: var(--text-secondary);">Nenhum comentário ainda. Seja o primeiro!</div>';
                return;
            }
            
            container.innerHTML = cidadeComentarios.map(c => `
                <div class="list-item">
                    <div>
                        <strong>${escapeHtml(c.nome)}</strong> <small style="color: var(--text-secondary);">${c.data}</small><br>
                        ${escapeHtml(c.mensagem)}
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updatePageContent() {
            const estadoNome = estados.find(e => e.sigla === currentEstado)?.nome || currentEstado;
            document.getElementById('location-display').innerHTML = `${estadoNome} • ${currentCidade}`;
            
            // Bairros
            const bairros = getBairros(currentCidade);
            document.getElementById('bairros-list').innerHTML = bairros.map(b => `<div class="list-item">${b}</div>`).join('');
            
            // Hava Durumu
            const weather = getWeather(currentCidade);
            document.getElementById('weather-content').innerHTML = `
                <div class="weather-icon">${weather.condicao.split(' ')[0]}</div>
                <div class="weather-temp">${weather.temperatura}°C</div>
                <div>${weather.condicao}</div>
                <div style="margin-top: 10px;">💧 Umidade: ${weather.umidade}%</div>
                <div>💨 Vento: ${weather.vento} km/h</div>
            `;
            
            // Duyurular
            const duyurular = [
                `📢 ${currentCidade} recebe investimento de R$ 15 milhões!`,
                `🎉 Festival de ${currentCidade} começa na próxima semana!`,
                `🏥 Novo hospital será inaugurado em ${currentCidade}`,
                `🚧 Obras de mobilidade urbana em ${currentCidade}`,
                `🌳 Projeto de arborização: ${Math.floor(Math.random() * 10000)} novas árvores`
            ];
            document.getElementById('announcements-list').innerHTML = duyurular.map(d => `<div class="list-item">${d}</div>`).join('');
            
            // Telefonlar
            const telefones = [
                {kurum: `Prefeitura de ${currentCidade}`, numara: `0800 123 ${Math.floor(Math.random() * 9000 + 1000)}`},
                {kurum: "Hospital Regional", numara: `(62) ${Math.floor(Math.random() * 9000 + 1000)}-${Math.floor(Math.random() * 9000 + 1000)}`},
                {kurum: "Polícia Militar", numara: "190"},
                {kurum: "SAMU", numara: "192"},
                {kurum: "Corpo de Bombeiros", numara: "193"}
            ];
            document.getElementById('phones-list').innerHTML = telefones.map(t => `
                <div class="list-item">
                    <span>${t.kurum}</span>
                    <span class="phone-number">${t.numara}</span>
                </div>
            `).join('');
            
            // Ulaşım
            document.getElementById('transport-list').innerHTML = `
                <div class="list-item">🚍 Ônibus: R$ 4,50</div>
                <div class="list-item">🚇 Metrô: 5h à meia-noite</div>
                <div class="list-item">🚕 Táxi: Bandeira 1 - R$ 5,00</div>
                <div class="list-item">🚲 Bike compartilhada: R$ 10/dia</div>
                <div class="list-item">🚗 Uber: A partir de R$ 7,00</div>
            `;
            
            // Turizm
            document.getElementById('turismo-list').innerHTML = pontosTuristicos.map(p => `
                <div class="list-item">
                    <div>
                        <strong>${p.nome}</strong><br>
                        <small>${p.descricao}</small>
                    </div>
                    <span class="badge badge-${p.tipo}">${p.tipo}</span>
                </div>
            `).join('');
            
            // Restoranlar
            document.getElementById('restaurants-list').innerHTML = restaurantes.map(r => `
                <div class="list-item">
                    <div>
                        <strong>${r.nome}</strong><br>
                        <small>${r.tipo} • ${r.preco}</small>
                    </div>
                    <div>⭐ ${r.nota}</div>
                </div>
            `).join('');
            
            // Etkinlikler
            const eventos = [
                "🎭 Festival de Teatro - 15 Maio",
                "🎵 Show Nacional - 22 Maio",
                "🏃 Corrida Noturna - 30 Maio",
                "🍽️ Festival Gastronômico - 05 Junho",
                "🎨 Exposição de Arte - 10 Junho"
            ];
            document.getElementById('events-list').innerHTML = eventos.map(e => `<div class="list-item">${e}</div>`).join('');
            
            // İstatistikler
            const populacao = Math.floor(Math.random() * 5000 + 100);
            const idh = (0.7 + Math.random() * 0.25).toFixed(3);
            const areaVerde = Math.floor(Math.random() * 35 + 5);
            const saneamento = Math.floor(Math.random() * 30 + 65);
            document.getElementById('statistics-list').innerHTML = `
                <div class="list-item">👥 População: ${populacao} mil</div>
                <div class="list-item">📊 IDH: ${idh}</div>
                <div class="list-item">🌳 Área Verde: ${areaVerde} m²/habitante</div>
                <div class="list-item">💧 Saneamento: ${saneamento}%</div>
                <div class="list-item">🏫 Escolas: ${Math.floor(Math.random() * 50 + 10)}</div>
            `;
            
            updateComments();
        }

        function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            
            const estadoSelect = document.getElementById('estado-select');
            estadoSelect.innerHTML = estados.map(e => `<option value="${e.sigla}">${e.sigla} - ${e.nome}</option>`).join('');
            estadoSelect.value = "SP";
            
            changeEstado();
            
            setInterval(updateClock, 1000);
            updateClock();
        }
        
        init();
    </script>
</body>
</html>
