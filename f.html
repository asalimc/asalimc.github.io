<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASC CAFÉ | Global Trading Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Sora:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1113; 
            --surface: #1e2022;
            --primary: #d4af37;
            --success: #10b981;
            --text: #e2e8f0;
            --border: #333639;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }

        .app-header { background: #000; padding: clamp(15px, 4vw, 25px); text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .brand { font-family: 'Sora', sans-serif; font-size: clamp(16px, 5vw, 20px); letter-spacing: 4px; font-weight: 800; color: var(--primary); text-transform: uppercase; }

        .market-bar { display: flex; gap: 10px; padding: 12px; overflow-x: auto; scrollbar-width: none; background: #000; -webkit-overflow-scrolling: touch; }
        .market-card { background: var(--surface); padding: 10px; border-radius: 8px; min-width: 130px; flex: 1; border: 1px solid var(--border); }
        .market-card label { font-size: 7px; font-weight: 800; color: var(--primary); display: block; margin-bottom: 2px; text-transform: uppercase; }
        .market-card input { width: 100%; border: none; font-size: 15px; font-weight: 800; color: #fff; background: transparent; }

        .container { padding: 15px 15px 100px; max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .product-card { background: var(--surface); border-radius: 12px; padding: 18px; border: 1px solid var(--border); }
        .product-card h2 { font-size: 12px; margin: 0 0 12px; color: var(--primary); font-weight: 800; border-left: 3px solid var(--primary); padding-left: 10px; text-transform: uppercase; }

        .unit-display { background: rgba(212,175,55,0.05); border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .unit-display label { font-size: 9px; font-weight: 800; color: var(--primary); }
        .unit-display b { font-size: 14px; color: #fff; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .input-box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .input-box label { display: block; font-size: 8px; font-weight: 800; color: #666; margin-bottom: 2px; }
        .input-box input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: 700; color: #fff; }

        .quick-actions { display: flex; gap: 6px; margin-bottom: 12px; }
        .quick-actions button { flex: 1; padding: 10px; font-size: 9px; font-weight: 800; background: #333; border: none; border-radius: 6px; color: #fff; }

        .res-line { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
        .res-line span { font-size: 10px; font-weight: 700; color: #94a3b8; }
        .res-line b { font-size: 15px; color: var(--primary); }

        .margin-box { margin-top: 12px; background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 8px; border: 1px solid var(--success); display: flex; justify-content: space-between; align-items: center; }
        .margin-box span { font-size: 10px; font-weight: 800; color: var(--success); }
        .margin-box b { font-size: 17px; color: var(--success); }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; border: none; font-size: 24px; color: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 100; cursor: pointer; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; }
        .modal-content { width: 100%; max-width: 900px; margin: auto; padding: 10px; }
        .modal-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px 0; position: sticky; top: 0; background: #000; z-index: 1001; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: 800; font-size: 10px; text-transform: uppercase; cursor: pointer; }

        /* PDF Styling - Full Page Use */
        #pdfPage { background: white; width: 794px; min-height: 1123px; padding: 50px 60px; color: #000; position: relative; font-family: 'Times New Roman', serif; display: flex; flex-direction: column; justify-content: space-between; }
        .pdf-header { display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        .pdf-table th { background: #f2f2f2; border: 1px solid #000; padding: 12px; font-size: 11px; text-align: left; font-weight: 900; text-transform: uppercase; }
        .pdf-table td { border: 1px solid #000; padding: 15px 12px; font-size: 13px; font-weight: 700; }

        @media (min-width: 768px) { .container { display: grid; grid-template-columns: 1fr 1fr; } .modal-btns { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 820px) { .pdf-wrap { transform: scale(calc(100vw / 850)); transform-origin: top center; margin-bottom: -550px; } }
    </style>
</head>
<body>

    <header class="app-header"><div class="brand">ASC CAFÉ</div></header>

    <div class="market-bar">
        <div class="market-card"><label>USD/TRY (LIVE)</label><input type="number" id="uTry" value="34.35" step="0.0001" oninput="calc()"></div>
        <div class="market-card"><label>NY ARABICA (LB)</label><input type="number" id="iceNy" value="288.45" oninput="calc()"></div>
        <div class="market-card"><label>LDN ROBUSTA (MT)</label><input type="number" id="iceLdn" value="3339" oninput="calc()"></div>
    </div>

    <main class="container" id="grid"></main>

    <button class="fab" onclick="showPdf()"><i class="fa-solid fa-file-invoice"></i></button>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-btns">
                <button class="btn" style="background:#333; color:#fff;" onclick="hidePdf()">CLOSE / KAPAT</button>
                <button class="btn" style="background:var(--primary); color:#000;" onclick="downloadPdf()">SAVE / KAYDET</button>
                <button class="btn" style="background:#25d366; color:#fff;" onclick="shareWa()">WHATSAPP</button>
                <button class="btn" style="background:#fff; border:1px solid #000;" onclick="window.print()">PRINT / YAZDIR</button>
            </div>
            <div class="pdf-wrap">
                <div id="pdfPage"><div id="pdfInner" style="height:100%; display:flex; flex-direction:column;"></div></div>
            </div>
        </div>
    </div>

    <script>
        const PRODS = [
            { id: 'ar', name: 'NATURAL NY2/3 17/18 SSFC', type: 'NY' },
            { id: 'ro', name: 'BREZİLYA ROBUSTA (CONILON)', type: 'LDN' }
        ];

        async function fetchLiveCurrency() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if(data.rates && data.rates.TRY) {
                    document.getElementById('uTry').value = data.rates.TRY.toFixed(4);
                    calc();
                }
            } catch(e) { console.error("Rate sync error"); }
        }

        function getVals(id, type) {
            const kur = parseFloat(document.getElementById('uTry').value) || 34.35;
            const borsa = (type === 'NY') ? (parseFloat(document.getElementById('iceNy').value)/100)*2204.62 : parseFloat(document.getElementById('iceLdn').value);
            const ton = parseFloat(document.getElementById(id+'T').value) || 0;
            const karPct = (parseFloat(document.getElementById(id+'K').value) || 0) / 100;
            
            const costFob = borsa;
            const costCif = borsa + 350 + (borsa * 0.015);
            const costDdp = (costCif + 150) * 1.15;

            const sellFob = costFob * (1 + karPct);
            const sellCif = costCif * (1 + karPct);
            const sellDdp = costDdp * (1 + karPct);
            const netMargin = (sellDdp - costDdp) * ton;

            return { fob: sellFob, cif: sellCif, ddp: sellDdp, ton, kur, margin: netMargin };
        }

        function build() {
            document.getElementById('grid').innerHTML = PRODS.map(p => `
                <div class="product-card">
                    <h2>${p.name}</h2>
                    <div class="unit-display" id="${p.id}Unit"></div>
                    <div class="input-row">
                        <div class="input-box"><label>TONNAGE / TONAJ</label><input type="number" id="${p.id}T" value="1" oninput="calc()"></div>
                        <div class="input-box"><label>PROFIT / KÂR %</label><input type="number" id="${p.id}K" value="0" oninput="calc()"></div>
                    </div>
                    <div class="quick-actions">
                        <button onclick="document.getElementById('${p.id}T').value=1; calc()">1 MT</button>
                        <button onclick="document.getElementById('${p.id}T').value=19.2; calc()">19.2 MT</button>
                    </div>
                    <div id="${p.id}Res"></div>
                </div>
            `).join('');
            calc();
        }

        function calc() {
            PRODS.forEach(p => {
                const d = getVals(p.id, p.type);
                const kgUsd = (d.ddp/1000).toFixed(2);
                document.getElementById(p.id+'Unit').innerHTML = `<span>UNIT PRICE (KG)</span><b>$ ${kgUsd} / ₺ ${(kgUsd*d.kur).toFixed(2)}</b>`;
                document.getElementById(p.id+'Res').innerHTML = `
                    <div class="res-line"><span>FOB TOTAL</span><b>$ ${Math.round(d.fob*d.ton).toLocaleString()}</b></div>
                    <div class="res-line"><span>CIF TOTAL</span><b>$ ${Math.round(d.cif*d.ton).toLocaleString()}</b></div>
                    <div class="res-line" style="border:none"><span>DDP TOTAL</span><b>$ ${Math.round(d.ddp*d.ton).toLocaleString()}</b></div>
                    <div class="margin-box"><span>NET MARGIN (USD)</span><b>$ ${Math.max(0, Math.round(d.margin)).toLocaleString()}</b></div>
                `;
            });
        }

        function showPdf() {
            const client = prompt("Client / Company Name:") || "VALUED PARTNER";
            const ref = "ASC-" + Math.random().toString(36).substring(7).toUpperCase();
            let html = `
                <div class="pdf-header">
                    <div><h1 style="margin:0; font-size:42px; letter-spacing:-1px;">ASC CAFÉ</h1><p style="font-size:11px; font-weight:bold; letter-spacing:4px; color:#444;">GLOBAL COFFEE TRADING & LOGISTICS</p></div>
                    <div style="text-align:right">
                        <div style="background:#000; color:#fff; padding:8px 18px; font-weight:900; font-size:13px; margin-bottom:8px;">OFFER REF: ${ref}</div>
                        <p style="font-size:12px; font-weight:bold;">DATE: ${new Date().toLocaleDateString('tr-TR')}</p>
                    </div>
                </div>

                <div style="margin-bottom:30px; border-left:6px solid #000; padding-left:20px;">
                    <p style="font-size:12px; color:#666; margin:0; font-weight:bold; text-transform:uppercase;">OFFER PREPARED FOR:</p>
                    <p style="font-size:24px; font-weight:bold; margin:5px 0; color:#000;">${client.toUpperCase()}</p>
                </div>

                <div style="flex-grow: 1;">`;

            PRODS.forEach(p => {
                const d = getVals(p.id, p.type);
                html += `
                <div style="margin-bottom:40px;">
                    <div style="background:#f4f4f4; border:1px solid #000; padding:12px 20px; font-size:13px; font-weight:bold; display:flex; justify-content:space-between;">
                        <span>COMMODITY: ${p.name}</span>
                        <span>QUANTITY: ${d.ton} MT</span>
                    </div>
                    <table class="pdf-table">
                        <tr><th style="width:30%">Incoterm 2020</th><th style="width:20%">Unit (USD/KG)</th><th style="width:25%">Total (USD)</th><th style="width:25%">Total (TRY)</th></tr>
                        <tr><td>FOB (Free On Board)</td><td>$ ${(d.fob/1000).toFixed(2)}</td><td>$ ${Math.round(d.fob*d.ton).toLocaleString()}</td><td>₺ ${Math.round(d.fob*d.ton*d.kur).toLocaleString()}</td></tr>
                        <tr><td>CIF (Cost, Ins, Freight)</td><td>$ ${(d.cif/1000).toFixed(2)}</td><td>$ ${Math.round(d.cif*d.ton).toLocaleString()}</td><td>₺ ${Math.round(d.cif*d.ton*d.kur).toLocaleString()}</td></tr>
                        <tr style="background:#fafafa;"><td><b>DDP (Duty Paid)</b></td><td><b>$ ${(d.ddp/1000).toFixed(2)}</b></td><td><b>$ ${Math.round(d.ddp*d.ton).toLocaleString()}</b></td><td><b>₺ ${Math.round(d.ddp*d.ton*d.kur).toLocaleString()}</b></td></tr>
                    </table>
                </div>`;
            });

            html += `
                </div> <div style="display: flex; gap: 30px; padding-bottom: 40px; border-top: 1px solid #eee; padding-top: 30px;">
                    <div style="flex: 1; font-size: 10px; line-height: 1.7; text-align: justify;">
                        <b style="font-size:12px; border-bottom:2px solid #000; display:block; margin-bottom:10px;">TERMS & CONDITIONS (EN)</b>
                        • <b>FOB:</b> Goods loaded on vessel at origin.<br>
                        • <b>CIF:</b> Goods, insurance, and freight included.<br>
                        • <b>DDP:</b> Duties and delivery to door included.<br>
                        • <b>Pricing:</b> Based on live ICE market. Valid 48h.<br>
                        • <b>Payment:</b> SWIFT Transfer prior to release.<br>
                        • <b>Quality:</b> Export grade, SGS/Phyto provided.
                    </div>
                    <div style="flex: 1; font-size: 10px; line-height: 1.7; text-align: justify; border-left: 1px solid #eee; padding-left: 30px;">
                        <b style="font-size:12px; border-bottom:2px solid #000; display:block; margin-bottom:10px;">TİCARİ ŞARTLAR (TR)</b>
                        • <b>FOB:</b> Ürün gemiye yüklenmiş fiyattır.<br>
                        • <b>CIF:</b> Sigorta ve navlun dahil fiyattır.<br>
                        • <b>DDP:</b> Gümrük ve adrese teslim dahil fiyattır.<br>
                        • <b>Fiyat:</b> Canlı borsa odaklıdır. 48s geçerlidir.<br>
                        • <b>Ödeme:</b> Teslimat öncesi SWIFT havale.<br>
                        • <b>Kalite:</b> İhracat standartı, SGS onaylı.
                    </div>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; color:#111; border-top:3px solid #000; padding-top:25px;">
                    <div>TURKEY OFFICE:<br><span style="color:#555; font-weight:400;">+90 544 590 60 14</span></div>
                    <div style="text-align:center;">BRAZIL OFFICE:<br><span style="color:#555; font-weight:400;">+55 19 981 55 29 42</span></div>
                    <div style="text-align:right;">ASC CAFÉ GLOBAL<br>TRADING DIVISION</div>
                </div>`;
            
            document.getElementById('pdfInner').innerHTML = html;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function hidePdf() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function downloadPdf() { 
            const opt = { margin: 0, filename: 'ASC_Premium_Offer.pdf', html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(document.getElementById('pdfPage')).save(); 
        }
        function shareWa() { window.open("https://wa.me/?text=ASC%20CAFÉ%20Premium%20Offer%20is%20Ready", "_blank"); }

        window.onload = () => { build(); fetchLiveCurrency(); };
    </script>
</body>
</html>
