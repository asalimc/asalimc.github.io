<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasília Anlık Bölge Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #009c3b 0%, #ffdf00 50%, #002776 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .brasilia-badge {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .live-badge {
            background: #ff4444;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            animation: pulse 1s infinite;
            margin-left: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .info-card {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .info-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-content {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            line-height: 1.5;
        }

        .update-time {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 20px;
        }

        .bairro-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .bairro-tag {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
        }

        hr {
            border-color: rgba(255,255,255,0.2);
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brasilia-badge">🇧🇷 BRASÍLIA - DF</div>
            <h1>📡 Bölge Paneli</h1>
            <p>Anlık bölge haberleri ve duyurular</p>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>🕐 Son Güncelleme</span>
                <span class="live-badge" id="liveBadge">CANLI</span>
            </div>
            <div id="updateTime" style="margin-top: 10px; font-size: 14px;">Yükleniyor...</div>
        </div>

        <div class="card" id="haberlerCard">
            <div class="info-title">📰 Bölge Haberleri</div>
            <div id="haberlerContent">Yükleniyor...</div>
        </div>

        <div class="card" id="bairroCard">
            <div class="info-title">🏘️ Bölgeler</div>
            <div class="bairro-list" id="bairroList"></div>
        </div>

        <div class="card" id="durumCard">
            <div class="info-title">📍 Bölge Durumu</div>
            <div id="durumContent">Yükleniyor...</div>
        </div>

        <div class="update-time">
            🔄 Her 10 dakikada bir otomatik güncellenir<br>
            📱 Telegram: @Krizgozlem_bot
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('brasilia_data.json?v=' + Date.now());
                const data = await response.json();
                
                document.getElementById('updateTime').innerHTML = data.son_guncelleme || 'Veri alınamadı';
                
                if (data.haberler && data.haberler.length > 0) {
                    let haberHtml = '';
                    for (const haber of data.haberler.slice(0, 10)) {
                        haberHtml += `
                            <div class="info-card">
                                <div style="font-weight: bold;">📍 ${haber.bairro || 'Brasília'}</div>
                                <div style="font-size: 13px; margin-top: 5px;">${haber.baslik || haber.metin}</div>
                                <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 8px;">🕐 ${haber.zaman || 'Şimdi'}</div>
                            </div>
                        `;
                    }
                    document.getElementById('haberlerContent').innerHTML = haberHtml;
                } else {
                    document.getElementById('haberlerContent').innerHTML = '<div class="info-card">Henüz haber alınamadı</div>';
                }
                
                if (data.bairrolar && data.bairrolar.length > 0) {
                    let bairroHtml = '';
                    for (const b of data.bairrolar) {
                        bairroHtml += `<span class="bairro-tag">${b}</span>`;
                    }
                    document.getElementById('bairroList').innerHTML = bairroHtml;
                }
                
                if (data.durum) {
                    document.getElementById('durumContent').innerHTML = `
                        <div class="info-card">
                            <div>🌡️ ${data.durum.hava || 'Bilinmiyor'}</div>
                            <div>🚦 ${data.durum.trafik || 'Veri yok'}</div>
                            <div>🔒 ${data.durum.guvenlik || 'Normal'}</div>
                        </div>
                    `;
                }
                
            } catch(e) {
                console.log('Veri bekleniyor...');
                document.getElementById('haberlerContent').innerHTML = '<div class="info-card">⏳ İlk veriler hazırlanıyor... 10 dakika içinde gelecek.</div>';
            }
        }
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
