<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASC CAFÉ | Professional Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #1e293b; --card: #334155; --primary: #7dd3fc; 
            --success: #4ade80; --danger: #fb7185; --text: #f1f5f9; --border: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body, html { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; 
        }

        .app-wrapper { height: 100%; display: flex; flex-direction: column; padding: 12px; gap: 12px; }

        .market-bar { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            height: 90px; flex-shrink: 0;
        }
        .m-item { 
            background: var(--card); border-radius: 12px; border: 2px solid var(--border);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .m-item label { font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
        .m-item b { font-family: 'JetBrains Mono'; font-size: clamp(16px, 2vw, 22px); color: #fff; }

        .flash-up { animation: flash-green 1s ease-out; border-color: var(--success) !important; color: var(--success) !important; }
        .flash-down { animation: flash-red 1s ease-out; border-color: var(--danger) !important; color: var(--danger) !important; }
        @keyframes flash-green { 0% { background: var(--success); } 100% { background: var(--card); } }
        @keyframes flash-red { 0% { background: var(--danger); } 100% { background: var(--card); } }

        .container { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
            flex-grow: 1; min-height: 0;
        }

        @media (max-width: 1024px) { 
            body, html { overflow-y: auto; height: auto; }
            .container { grid-template-columns: 1fr; }
            .market-bar { grid-template-columns: 1fr; height: auto; }
            .m-item { padding: 15px; }
        }

        .p-card { 
            background: var(--card); border-radius: 16px; padding: 20px; 
            border: 1px solid var(--border); display: flex; flex-direction: column;
            justify-content: space-between;
        }
        h2 { font-size: 12px; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 12px; }

        .i-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .i-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .i-box label { display: block; font-size: 9px; color: #94a3b8; font-weight: 800; margin-bottom: 4px; }
        .i-box input { width: 100%; background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 800; outline: none; font-family: 'JetBrains Mono'; }

        .m-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .m-line span { font-size: 11px; color: #cbd5e1; }
        .v-u { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 16px; color: var(--primary); }

        .profit-panel { background: rgba(0,0,0,0.3); color: var(--success); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .profit-panel b { font-size: 24px; font-family: 'JetBrains Mono'; display: block; }

        .btn-pdf { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 12px; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 9999; justify-content: center; align-items: center; }
        #pdf-preview { background: white; width: 95%; height: 95vh; border-radius: 10px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="market-bar">
        <div class="m-item" id="c-brl" onclick="mManual('brl')"><label>USD/BRL</label><b id="v-brl">5.72</b></div>
        <div class="m-item" id="c-try" onclick="mManual('try')"><label>USD/TRY</label><b id="v-try">34.35</b></div>
        <div class="m-item" id="c-b3" onclick="mManual('b3')"><label>B3 COFFEE</label><b id="v-b3">301.50</b></div>
    </div>
    <div class="container" id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="pdf-preview">
        <div style="background:#1e293b; padding:10px; display:flex; justify-content:space-between; position:sticky; top:0; z-index:100;">
            <button onclick="downloadFinalPDF()" style="background:var(--success); border:none; padding:10px 20px; font-weight:900; border-radius:5px; cursor:pointer;">TEKLİFİ ONAYLA VE İNDİR</button>
            <button onclick="closeModal()" style="background:var(--danger); color:white; border:none; padding:10px 20px; font-weight:900; border-radius:5px; cursor:pointer;">KAPAT</button>
        </div>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
const API_KEY = "4dfdfe192bmshe85964c016dba78p18c09ajsn9718915999f6";
let DB = { try: 34.35, brl: 5.72, b3: 301.50 };

const ITEMS = [
    { id: 'mi', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', diff: 15 },
    { id: 'sa', name: 'BRAZIL SANTOS NY2/3 17/18', diff: 10 }
];

async function sync() {
    try {
        const rK = await fetch('https://open.er-api.com/v6/latest/USD');
        const dK = await rK.json();
        if(dK.rates) { mUpdate('try', dK.rates.TRY); mUpdate('brl', dK.rates.BRL); }
        const rB = await fetch(`https://yahoo-finance-scraper.p.rapidapi.com/api/chart/SCF=F?interval=1m`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'yahoo-finance-scraper.p.rapidapi.com' }
        });
        const dB = await rB.json();
        const p = dB.body?.meta?.regularMarketPrice;
        if(p) mUpdate('b3', p);
    } catch(e) { console.warn("API Offline"); }
}

function mUpdate(k, v) {
    const el = document.getElementById(`v-${k}`);
    const card = document.getElementById(`c-${k}`);
    const old = DB[k];
    if(v.toFixed(2) !== old.toFixed(2)) {
        DB[k] = v;
        const icon = v > old ? '▲' : '▼';
        el.innerHTML = `${v.toFixed(2)} ${icon}`;
        card.className = `m-item ${v > old ? 'flash-up' : 'flash-down'}`;
        calc();
        setTimeout(() => card.className = 'm-item', 1500);
    }
}

function mManual(k) { const v = prompt("Güncel Değer:", DB[k]); if(v) mUpdate(k, parseFloat(v)); }

function start() {
    document.getElementById('grid').innerHTML = ITEMS.map(i => `
        <div class="p-card">
            <h2>${i.name}</h2>
            <div class="i-grid">
                <div class="i-box"><label>MARJ (%)</label><input type="number" id="k_${i.id}" value="5" oninput="calc()"></div>
                <div class="i-box"><label>MİKTAR (SC)</label><input type="number" id="t_${i.id}" value="320" oninput="calc()"></div>
            </div>
            <div id="list_${i.id}"></div>
            <div class="profit-panel"><small>NET ÖNGÖRÜLEN KÂR</small><b id="prof_${i.id}">$ 0</b></div>
            <button class="btn-pdf" onclick="preparePDF('${i.id}')">RESMİ TEKLİF (TEFERRUATLI PDF)</button>
        </div>
    `).join('');
    calc();
}

function calc() {
    ITEMS.forEach(i => {
        const k = (parseFloat(document.getElementById(`k_${i.id}`).value) || 0) / 100;
        const q = parseFloat(document.getElementById(`t_${i.id}`).value) || 0;
        const fob = DB.b3 + i.diff;
        const ddp = (fob + 36) * 1.10;
        const sat = ddp * (1 + k);
        const fmt = (n) => Math.round(n).toLocaleString('en-US');
        document.getElementById(`list_${i.id}`).innerHTML = `
            <div class="m-line"><span>BİRİM FOB (BRAZIL)</span><b class="v-u">$ ${fmt(fob)}</b></div>
            <div class="m-line"><span>BİRİM DDP (TURKEY)</span><b class="v-u">$ ${fmt(ddp)}</b></div>
            <div class="m-line" style="border:none"><span>BİRİM SATIŞ</span><b style="color:#fff; font-size:22px">$ ${fmt(sat)}</b></div>
        `;
        document.getElementById(`prof_${i.id}`).innerText = `$ ${fmt((sat - ddp) * q)}`;
    });
}

function preparePDF(id) {
    const firma = prompt("Resmi Alıcı (Firma Ünvanı):"); if(!firma) return;
    const ref = "ASC-" + Math.floor(100000 + Math.random() * 900000);
    const i = ITEMS.find(x => x.id === id);
    const q = parseFloat(document.getElementById(`t_${i.id}`).value);
    const k = (parseFloat(document.getElementById(`k_${i.id}`).value) || 0) / 100;
    const fob = DB.b3 + i.diff;
    const ddp = (fob + 36) * 1.10;
    const sat = ddp * (1 + k);
    const ytl = sat * q * DB.try;
    const fmt = (n) => Math.round(n).toLocaleString('tr-TR');

    document.getElementById('pdf-content').innerHTML = `
        <div style="padding:45px; color:#1e293b; background:white; position:relative; min-height:1120px; font-family:'Inter', sans-serif;">
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-45deg); font-size:120px; color:rgba(0,0,0,0.03); font-weight:900; z-index:0; pointer-events:none; white-space:nowrap;">ASC GLOBAL TRADING</div>
            
            <div style="display:flex; justify-content:space-between; border-bottom:5px solid #1e293b; padding-bottom:20px; margin-bottom:30px; position:relative; z-index:1;">
                <div>
                    <h1 style="margin:0; font-size:38px; letter-spacing:-1px; color:#0f172a;">ASC CAFÉ <span style="color:#7dd3fc;">GLOBAL</span></h1>
                    <p style="font-size:10px; font-weight:800; color:#64748b; margin-top:5px; text-transform:uppercase;">International Coffee Trading & Logistics Division</p>
                </div>
                <div style="text-align:right;">
                    <div style="background:#0f172a; color:white; padding:5px 15px; font-size:11px; font-weight:800; border-radius:4px;">OFFICIAL QUOTATION</div>
                    <p style="font-size:12px; margin-top:8px;"><b>REF NO:</b> ${ref}</p>
                    <p style="font-size:12px;"><b>TARİH:</b> ${new Date().toLocaleDateString('tr-TR')}</p>
                </div>
            </div>

            <div style="margin-bottom:35px; position:relative; z-index:1;">
                <p style="font-size:11px; color:#64748b; text-transform:uppercase; font-weight:800; margin-bottom:5px;">Alıcı Ünvanı / Client:</p>
                <h2 style="font-size:24px; color:#0f172a; border:none; padding:0; margin:0;">${firma.toUpperCase()}</h2>
            </div>

            <table style="width:100%; border-collapse:collapse; margin-bottom:30px; position:relative; z-index:1;">
                <thead>
                    <tr style="background:#f8fafc; border-top:2px solid #0f172a; border-bottom:1px solid #e2e8f0;">
                        <th style="padding:15px; text-align:left; font-size:12px; color:#0f172a;">PRODUCT DESCRIPTION</th>
                        <th style="padding:15px; text-align:right; font-size:12px; color:#0f172a;">QUANTITY</th>
                        <th style="padding:15px; text-align:right; font-size:12px; color:#0f172a;">UNIT PRICE (USD)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding:20px 15px; border-bottom:1px solid #f1f5f9; font-weight:700;">${i.name}<br><small style="color:#64748b; font-weight:400;">Origin: Brazil | Crop: 2025/26 | Type: Arabica</small></td>
                        <td style="padding:20px 15px; border-bottom:1px solid #f1f5f9; text-align:right; font-weight:700;">${q} Saca<br><small style="color:#64748b; font-weight:400;">${(q*60/1000).toFixed(2)} MT Net</small></td>
                        <td style="padding:20px 15px; border-bottom:1px solid #f1f5f9; text-align:right; font-weight:700;">$ ${fmt(sat)}</td>
                    </tr>
                </tbody>
            </table>

            <div style="display:flex; justify-content:flex-end; margin-bottom:40px; position:relative; z-index:1;">
                <div style="width:350px;">
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:12px; color:#64748b;">TOTAL FOB BRAZIL (Est.)</span>
                        <span style="font-weight:700; font-size:12px;">$ ${fmt(fob * q)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f1f5f9;">
                        <span style="font-size:12px; color:#64748b;">LOGISTICS & DUTY (DDP Charge)</span>
                        <span style="font-weight:700; font-size:12px;">$ ${fmt((sat - fob) * q)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:20px 15px; background:#0f172a; border-radius:8px; margin-top:10px; color:white;">
                        <span style="font-size:14px; font-weight:800;">GRAND TOTAL (USD)</span>
                        <span style="font-size:18px; font-weight:800;">$ ${fmt(sat * q)}</span>
                    </div>
                    <div style="padding:15px; background:#f0f9ff; border:1px dashed #7dd3fc; border-radius:8px; margin-top:10px; text-align:center;">
                        <small style="color:#0369a1; font-weight:800;">GÜNCEL TL KARŞILIĞI (BANKA SATIŞ)</small>
                        <h2 style="color:#0c4a6e; margin:5px 0;">₺ ${fmt(ytl)}</h2>
                    </div>
                </div>
            </div>

            <div style="background:#fff7ed; padding:20px; border-radius:8px; border:1px solid #ffedd5; font-size:10px; color:#9a3412; line-height:1.6; position:relative; z-index:1;">
                <h4 style="margin:0 0 5px 0; font-size:11px; text-transform:uppercase;">Terms & Conditions / Şartlar:</h4>
                * Fiyatlar borsa (B3/ICE) ve döviz kurlarındaki dalgalanmalar nedeniyle 24 saat geçerlidir.<br>
                * Ödeme: Akreditif (L/C) veya CAD (Cash Against Documents).<br>
                * Teslimat: DDP Turkey (Gümrük ve Vergiler dahil, depo teslim).<br>
                * Borsa Baz Fiyatı: $ ${DB.b3.toFixed(2)} (B3 Arabica Futures)
            </div>

            <div style="margin-top:60px; display:flex; justify-content:space-between; position:relative; z-index:1;">
                <div style="text-align:center; width:200px;">
                    <p style="font-size:10px; color:#64748b; margin-bottom:50px;">ONAYLAYAN (ASC GLOBAL)</p>
                    <div style="border-top:1px solid #0f172a; padding-top:10px; font-weight:800; font-size:12px;">AUTHORIZED SIGNATURE</div>
                </div>
                <div style="text-align:right;">
                    <div style="width:100px; height:100px; border:4px double #1e293b; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; color:#1e293b; transform:rotate(-15deg); opacity:0.6;">ASC SEALED</div>
                </div>
            </div>
        </div>`;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function downloadFinalPDF() { html2pdf().set({ margin:0, filename:'ASC_GLOBAL_OFFER.pdf', html2canvas:{scale:3}, jsPDF:{unit:'mm', format:'a4', orientation:'portrait'} }).from(document.getElementById('pdf-content')).save(); }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
window.onload = () => { sync(); setInterval(sync, 15000); start(); };
</script>
</body>
</html>
