name: Brasília Bölge Paneli

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Kütüphaneleri yükle
        run: |
          pip install requests beautifulsoup4
      
      - name: Brasília panelini çalıştır
        run: python brasilia_scraper.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      - name: GitHub'a kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add brasilia_data.json index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Brasília panel güncellendi $(date '+%H:%M')"
          git push
