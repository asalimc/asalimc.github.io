<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dünya Paneli | 25 Kategori | Brasília - Brezilya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            color: #1a2a3a;
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e0e6ed;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #009c3b;
        }

        .header p {
            font-size: 0.85rem;
            color: #6c7a8a;
        }

        .live-badge {
            background: #e74c3c;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Ana container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Grid sistemi - 25 kategori için */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        /* Kartlar */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eef2f8;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .card-header {
            background: #f8fafc;
            padding: 16px 20px;
            border-bottom: 2px solid #009c3b;
            font-weight: 700;
            font-size: 1rem;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header span:first-child {
            font-size: 1.3rem;
        }

        .card-content {
            padding: 16px 20px;
            max-height: 380px;
            overflow-y: auto;
        }

        /* Liste stilleri */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f8;
            flex-wrap: wrap;
            gap: 8px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .item-value {
            color: #009c3b;
            font-weight: 700;
        }

        .item-sub {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .item-change-up {
            color: #27ae60;
            font-size: 0.7rem;
        }

        .item-change-down {
            color: #e74c3c;
            font-size: 0.7rem;
        }

        /* 3'lü grid (durum kartları için) */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .status-item {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            border: 1px solid #eef2f8;
        }

        .status-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1a2a3a;
        }

        .status-label {
            font-size: 0.7rem;
            color: #6c7a8a;
            margin-top: 4px;
        }

        /* Etiketler */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #f0f4f9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c3e50;
        }

        .tag:hover {
            background: #009c3b;
            color: white;
            cursor: default;
        }

        /* Tablo stilleri */
        .simple-table {
            width: 100%;
            border-collapse: collapse;
        }

        .simple-table td {
            padding: 8px 0;
            border-bottom: 1px solid #eef2f8;
        }

        .simple-table tr:last-child td {
            border-bottom: none;
        }

        /* Progress bar */
        .progress-bar {
            background: #eef2f8;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-fill {
            background: #009c3b;
            height: 100%;
            border-radius: 10px;
            width: 0%;
        }

        /* Anma bölümü özel */
        .anma-card {
            background: linear-gradient(135deg, #fef9f0 0%, #fff 100%);
            border-left: 4px solid #e74c3c;
        }

        .vefat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e6d2;
            flex-wrap: wrap;
            gap: 10px;
        }

        .vefat-name {
            font-weight: 700;
            color: #2c3e50;
        }

        .vefat-detail {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .vefat-age {
            background: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            margin-top: 32px;
            padding: 20px 24px;
            background: white;
            border-radius: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            border: 1px solid #eef2f8;
        }

        /* Scrollbar */
        .card-content::-webkit-scrollbar {
            width: 4px;
        }

        .card-content::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 4px;
        }

        .card-content::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px;
            }
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        // Vefat edenler (Anma bölümü)
        const vefatEdenler = [
            { ad: "Oscar Niemeyer", meslek: "Mimar", tarih: "5 Aralık 2012", yas: 104, aciklama: "Brasília'nın mimarı" },
            { ad: "Juscelino Kubitschek", meslek: "Cumhurbaşkanı", tarih: "22 Ağustos 1976", yas: 73, aciklama: "Brasília'nın kurucusu" },

            { ad: "Ayrton Senna", meslek: "Pilot", tarih: "1 Mayıs 1994", yas: 34, aciklama: "Brezilya efsanesi" },
            { ad: "Pelé", meslek: "Futbolcu", tarih: "29 Aralık 2022", yas: 82, aciklama: "Brezilya'nın kralı" },

        ];

        // 25 kategori listesi
        const categories = [
            { id: "doviz", name: "Döviz & Kripto", icon: "💰" },
            { id: "hava", name: "Hava Durumu", icon: "🌤️" },
            { id: "haberler", name: "Bölge Haberleri", icon: "📰" },
            { id: "deprem", name: "Deprem & Afet", icon: "🌋" },
            { id: "ekonomi", name: "Ekonomi", icon: "📈" },
            { id: "akaryakit", name: "Akaryakıt Fiyatları", icon: "⛽" },
            { id: "altin", name: "Altın & Emtia", icon: "🥇" },
            { id: "borsa", name: "Borsa", icon: "📊" },
            { id: "saglik", name: "Sağlık", icon: "🏥" },
            { id: "egitim", name: "Eğitim", icon: "📚" },
            { id: "spor", name: "Spor", icon: "⚽" },
            { id: "ulasim", name: "Ulaşım & Trafik", icon: "🚗" },
            { id: "emlak", name: "Emlak & Konut", icon: "🏠" },
            { id: "otomotiv", name: "Otomotiv", icon: "🚘" },

            { id: "tarim", name: "Tarım", icon: "🌾" },
            { id: "alisveris", name: "Alışveriş", icon: "🛒" },
            { id: "guvenlik", name: "Güvenlik", icon: "🔒" },
            { id: "eglence", name: "Eğlence", icon: "🎭" },
            { id: "gocmen", name: "Göçmen", icon: "🚶" },
            { id: "araclar", name: "Araçlar", icon: "🧮" },
            { id: "istatistik", name: "İstatistik", icon: "📊" },
            { id: "harita", name: "Harita", icon: "🗺️" }
        ];

        function renderValue(key, val) {
            if (typeof val === 'object') {
                let html = '';
                for (const [k, v] of Object.entries(val)) {
                    html += `<div class="list-item"><span class="item-label">${k}</span><span class="item-value">${v}</span></div>`;
                }
                return html;
            }
            return `<div class="list-item"><span class="item-value">${val}</span></div>`;
        }

        function renderCard(category) {
            const data = panelData[category.id];
            if (!data) return '';

            let content = '';
            
            if (category.id === 'haberler') {
                content = data.map(h => `<div class="list-item"><span class="item-label">📌</span><span class="item-value">${h}</span></div>`).join('');
            } else if (category.id === 'akaryakit') {
                content = `
                    <div class="list-item"><span class="item-label">⛽ Benzin</span><span class="item-value">${data.benzin} BRL/L</span></div>
                    <div class="list-item"><span class="item-label">⛽ Motorin</span><span class="item-value">${data.motorin} BRL/L</span></div>
                    <div class="list-item"><span class="item-label">🌽 Etanol</span><span class="item-value">${data.etanol} BRL/L</span></div>
                    <div class="list-item"><span class="item-label">💨 LPG</span><span class="item-value">${data.lpg} BRL/L</span></div>
                `;
            } else {
                content = renderValue(category.id, data);
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <span>${category.icon}</span>
                        <span>${category.name}</span>
                    </div>
                    <div class="card-content">
                        ${content}
                    </div>
                </div>
            `;
        }

        function renderPanel() {
            const grid = document.getElementById('panelGrid');
            let html = '';
            
            // Anma kartı özel
            html += `
                <div class="card anma-card">
                    <div class="card-header">
                        <span>🕯️</span>
                        <span>Anma Paneli - Vefat Edenler</span>
                    </div>
                    <div class="card-content">
                        ${vefatEdenler.map(v => `
                            <div class="vefat-item">
                                <div>
                                    <div class="vefat-name">${v.ad}</div>
                                    <div class="vefat-detail">${v.meslek} | ${v.tarih} | ${v.aciklama}</div>
                                </div>
                                <div class="vefat-age">${v.yas} yas</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // Diğer 25 kategori
            for (const cat of categories) {
                html += renderCard(cat);
            }
            
            grid.innerHTML = html;
        }

        // Sayfa başlatma
        function init() {
            renderPanel();
            updateTime();
            setInterval(updateTime, 60000);
        }

        init();
    </script>
</body>
</html>
