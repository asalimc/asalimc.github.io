<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER KAHVE TERMİNALİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001f3f; --white: #ffffff; --blue: #00d4ff; --border: 4px solid #001f3f; }
        * { box-sizing: border-box; font-family: 'Sora', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); margin: 0; padding: 10px; color: var(--navy); min-height: 100vh; }
        .header { background: var(--navy); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 0px var(--blue); }
        .header h1 { font-size: 14px; margin: 0 0 5px 0; font-weight: 900; text-transform: uppercase; }
        .kur-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .kur-item { background: white; border: var(--border); padding: 8px; border-radius: 10px; }
        .kur-item label { font-size: 9px; font-weight: 900; color: var(--navy); display: block; text-transform: uppercase; }
        .kur-item input { width: 100%; border: none; font-size: 18px; font-weight: 900; color: #d35400; outline: none; background: transparent; }
        .card { background: var(--white); border: var(--border); border-radius: 20px; padding: 15px; box-shadow: 8px 8px 0px var(--navy); margin-bottom: 20px; }
        h2 { font-size: 15px; font-weight: 900; margin: 0 0 12px 0; border-bottom: 4px solid var(--navy); padding-bottom: 4px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 8px; font-weight: 900; display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px; border: 2px solid var(--navy); border-radius: 8px; font-size: 16px; font-weight: 900; }
        .summary-box { background: #f1f5f9; padding: 12px; border-radius: 12px; border: 2.5px solid var(--navy); margin-bottom: 12px; }
        .line { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1.5px solid #cbd5e1; font-size: 11px; }
        .line b { font-weight: 900; color: #000; font-size: 11px; }
        .m-head { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--navy); margin: 10px 0 6px; border-left: 4px solid var(--blue); padding-left: 6px; background: rgba(0,212,255,0.1); }
        .offer-line { background: #e0f2fe; padding: 4px 8px; border-radius: 4px; margin: 2px 0; border: 1px solid var(--blue); }
        .price-row { padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; background: #059669; color: white; margin-bottom: 6px; }
        .p-val { font-size: 20px; font-weight: 900; color: #ffffff; }
        #notif-btn { background: #ff4757; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 12px; margin-top: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 0 #b3303c; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>MASTER KAHVE TERMİNALİ</h1>
        <div class="kur-bar">
            <div class="kur-item"><label>USD / TRY</label><input type="number" id="uTry" value="34.35" step="0.0001" oninput="triggerAjan()"></div>
            <div class="kur-item"><label>USD / BRL</label><input type="number" id="uBrl" value="5.85" step="0.0001" oninput="triggerAjan()"></div>
        </div>
        <button id="notif-btn" onclick="setupPush()">KORUMAYI AKTİF ET</button>
    </header>
    <div id="mainGrid"></div>
</div>

<script>
    // Dinamik Değişkenler (Ajanın takip ettiği merkez)
    const STATS = { gumruk: 0.08, igv: 0.05, kdv: 0.10, navlun: 350, sigorta: 0.015, limanMasraf: 150 };
    const PRODUCTS = [
        { id: 'ara', name: 'ARABICA RIO MINAS', brl: 1191, kar: 30 },
        { id: 'rob', name: 'ROBUSTA CONILON', brl: 886, kar: 5 },
        { id: 'san', name: 'ARABICA SANTOS NY2', brl: 1250, kar: 15 },
        { id: 'bou', name: 'ARABICA BOURBON', brl: 1420, kar: 10 }
    ];

    async function setupPush() {
        if ('serviceWorker' in navigator) {
            const permission = await Notification.requestPermission();
            if (permission === "granted") updateUI(true);
        }
    }

    async function liveUpdate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            if (data && data.rates) {
                document.getElementById('uTry').value = data.rates.TRY.toFixed(4);
                document.getElementById('uBrl').value = data.rates.BRL.toFixed(4);
                triggerAjan();
                updateUI(true);
            }
        } catch (e) { console.log("Ajan kur verisi bekliyor..."); }
    }

    function createCards() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        PRODUCTS.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <h2>${p.name}</h2>
                    <div class="input-row">
                        <div class="input-group"><label>BRL/60KG</label><input type="number" id="${p.id}In" value="${p.brl}" oninput="triggerAjan()"></div>
                        <div class="input-group"><label>TOPLAM TON</label><input type="number" id="${p.id}Ton" value="1" step="0.1" oninput="triggerAjan()"></div>
                        <div class="input-group"><label>KÂR %</label><input type="number" id="${p.id}Kar" value="${p.kar}" oninput="triggerAjan()"></div>
                    </div>
                    <div class="summary-box" id="${p.id}Summary"></div>
                    <div class="price-row"><span>NET HEDEF KÂR:</span><span class="p-val" id="${p.id}FinalTl">0 ₺</span></div>
                </div>
            `;
        });
        liveUpdate();
        setInterval(liveUpdate, 60000);
    }

    function updateUI(active) {
        const btn = document.getElementById('notif-btn');
        btn.innerText = active ? "ANALİZ MODU AKTİF ●" : "KORUMAYI AKTİF ET";
        btn.style.background = active ? "#059669" : "#ff4757";
    }

    // Ajan: Tüm veri girişlerini ve dış kaynak değişimlerini anında senkronize eder
    function triggerAjan() {
        calc();
    }

    function calc() {
        const uTry = parseFloat(document.getElementById('uTry').value) || 1;
        const uBrl = parseFloat(document.getElementById('uBrl').value) || 1;

        PRODUCTS.forEach(p => {
            const brl60 = parseFloat(document.getElementById(p.id + 'In').value) || 0;
            const tonaj = parseFloat(document.getElementById(p.id + 'Ton').value) || 0;
            const kO = (parseFloat(document.getElementById(p.id + 'Kar').value) || 0) / 100;

            // 1. TEMEL MALİYET HESAPLAMA (1 TON BAZ)
            const f1Usd = (brl60 / 60) * 1000 / uBrl;
            const c1Usd = f1Usd + STATS.navlun + (f1Usd * STATS.sigorta);
            const d1Try = (c1Usd + STATS.limanMasraf) * 1.15 * uTry; // %15 gümrük/igv yükü ile

            // 2. MÜŞTERİ TEKLİF PANELİ (TONAJLI)
            const fobSatis = (f1Usd * (1 + kO)) * tonaj * uTry;
            const cifSatis = (c1Usd * (1 + kO)) * tonaj * uTry;
            const ddpSatis = d1Try * (1 + kO) * tonaj;

            // 3. OPERASYONEL ÖZET
            const toplamCebindenCikan = d1Try * tonaj;
            const netHedefKar = toplamCebindenCikan * kO;

            document.getElementById(p.id+'Summary').innerHTML = `
                <div class="m-head">MÜŞTERİ TEKLİFİ (${tonaj} TON İÇİN)</div>
                <div class="line offer-line">FOB (BR Çıkış): <b>₺ ${Math.round(fobSatis).toLocaleString()}</b></div>
                <div class="line offer-line">CIF (Liman): <b>₺ ${Math.round(cifSatis).toLocaleString()}</b></div>
                <div class="line offer-line">DDP (Kapı): <b>₺ ${Math.round(ddpSatis).toLocaleString()}</b></div>
                
                <div class="m-head">OPERASYONEL MALİYET ANALİZİ</div>
                <div class="line">Toplam Gider: <b style="color:#d35400">₺ ${Math.round(toplamCebindenCikan).toLocaleString()}</b></div>
                <div class="line">Birim KG Maliyet: <b>${(d1Try/1000).toFixed(2)} ₺</b></div>
                <div class="line">DDP Ton ($): <b>$ ${Math.round(d1Try/uTry).toLocaleString()}</b></div>
            `;
            
            document.getElementById(p.id+'FinalTl').innerText = Math.round(netHedefKar).toLocaleString() + " ₺";
        });
    }

    window.onload = createCards;
</script>
</body>
</html>
