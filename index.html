<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO SISTEMA DE GESTÃO V16.2</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjmP7vlzAhZOEEvwcS1VIYCLlIkhNh6Kw",
            authDomain: "asctoptan.firebaseapp.com",
            projectId: "asctoptan",
            storageBucket: "asctoptan.firebasestorage.app",
            messagingSenderId: "195642720892",
            appId: "1:195642720892:web:70d1c1d71a338f2e9f7ff9"
        };

        const app = initializeApp(firebaseConfig);
        const fs = getFirestore(app);
        const auth = getAuth(app);

        window.fs = fs; window.auth = auth;
        window.fs_coll = collection; window.fs_doc = doc; window.fs_snap = onSnapshot;
        window.fs_add = addDoc; window.fs_upd = updateDoc; window.fs_del = deleteDoc;
        window.fs_set = setDoc; window.fs_q = query; window.fs_where = where;

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (err) { alert("Erro: " + err.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app-container').classList.remove('hidden');
                init();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app-container').classList.add('hidden');
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --navy: #0f172a; --yellow: #fbbf24; --white: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        * { font-style: normal !important; -webkit-tap-highlight-color: transparent; }
        
        .main-view { height: calc(100vh - 145px); overflow-y: auto; padding: 1rem; padding-bottom: 6rem; }
        nav { position: fixed !important; bottom: 0 !important; left: 0; right: 0; display: flex !important; z-index: 9999; height: 85px; background: white; border-top: 1px solid #eee; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 5px; }
        .pos-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 8px; transition: 0.2s; cursor: pointer; text-align: center; }
        
        .btn-yellow { background-color: var(--yellow); color: var(--navy); font-weight: 800; }
        .bg-navy { background-color: var(--navy); }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 30px; max-height: 90vh; overflow-y: auto; }
        .nav-active { color: var(--yellow) !important; border-top: 3px solid var(--yellow); }

        .excel-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .excel-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; color: #64748b; }
        .excel-table td { padding: 8px; border: 1px solid #e2e8f0; vertical-align: middle; }
        
        .filter-btn { padding: 6px 12px; border-radius: 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; background: white; }
        .filter-btn.active { background: var(--navy); color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-navy flex items-center justify-center p-6 z-[20000] hidden">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-400 rounded-2xl flex items-center justify-center text-navy font-black text-2xl mx-auto mb-4">PRO</div>
                <h2 class="text-2xl font-black text-navy uppercase">Login</h2>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200" required>
                <input type="password" id="login-pass" placeholder="Senha" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200" required>
                <button type="submit" class="w-full py-4 bg-amber-400 text-navy font-black rounded-2xl shadow-lg uppercase">Entrar</button>
            </form>
        </div>
    </div>

    <div id="main-app-container" class="hidden">

                <div>
                    <h1 id="brand-name" class="font-bold text-sm uppercase">GESTÃO</h1>
                    <span class="text-[9px] text-amber-400 uppercase font-black">SBO v16.2</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="text-[8px] bg-white/10 px-2 py-1 rounded font-bold uppercase">Sair</button>
        </header>

        <main class="main-view no-scrollbar" id="app-content">
            <div id="view-pos" class="h-full flex flex-col gap-4">
                <div class="bg-navy rounded-[35px] p-5 text-white shadow-2xl flex flex-col shrink-0">
                    <div class="flex justify-between items-center mb-2">
                        <select id="cart-customer-select" class="bg-transparent text-xs font-bold text-amber-400 outline-none"></select>
                        <button onclick="clearCart()" class="text-[10px] text-red-400 font-bold uppercase">Limpar</button>
                    </div>

                    <div class="pt-2 border-t border-slate-800 flex justify-between items-center">
                        <h3 id="cart-total" class="text-2xl font-black text-amber-400">R$ 0,00</h3>

                </div>
                <div class="flex-1">

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="set-cnpj" placeholder="CNPJ" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 outline-none">
                        <input type="text" id="set-ie" placeholder="IE (Inscrição Estadual)" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100 outline-none">

                    <div class="grid grid-cols-2 gap-4">

            <button onclick="switchTab('finance')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-finance"><i class="fas fa-chart-line text-xl"></i><span class="text-[8px] font-black uppercase">Finança</span></button>

                    <option value="Colar">Colar</option><option value="Brinco">Brinco</option><option value="Pulseira">Pulseira</option><option value="Anel">Anel</option><option value="Outros">Outros</option>
                </select>
                <input type="text" id="p-sku" placeholder="Referência" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100">

                <button id="btn-delete-product" onclick="deleteProduct()" class="w-full py-2 text-red-500 font-bold text-[10px] uppercase">EXCLUIR PRODUTO</button>

    <div id="modal-payment" class="modal-bg">

            <div class="grid grid-cols-3 gap-3">
                <button onclick="finishSale('Dinheiro')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2 font-bold text-[10px]"><i class="fas fa-money-bill-wave text-green-500 text-xl"></i>DINHEIRO</button>
                <button onclick="finishSale('Cartão')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2 font-bold text-[10px]"><i class="fas fa-credit-card text-blue-500 text-xl"></i>CARTÃO</button>
                <button onclick="finishSale('Pix')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2 font-bold text-[10px]"><i class="fas fa-bolt text-purple-500 text-xl"></i>PIX</button>
            </div>
            <button onclick="closeModal('modal-payment')" class="mt-6 text-slate-400 font-bold uppercase text-[10px]">Cancelar</button>

    <div id="modal-contact" class="modal-bg">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="c-modal-title" class="text-xl font-black uppercase text-navy">Cadastro</h3>
                <button onclick="pickFromContacts()" class="bg-amber-100 text-amber-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase"><i class="fas fa-address-book mr-1"></i> REHBER</button>

                <input type="hidden" id="c-id"><input type="hidden" id="c-type">
                <input type="text" id="c-name" placeholder="Nome Completo" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100">
                <input type="text" id="c-phone" placeholder="Telefone" class="w-full p-4 bg-slate-50 rounded-2xl ring-1 ring-slate-100">
                <button onclick="saveContact()" class="btn-yellow w-full py-4 rounded-2xl uppercase">Gravar</button>
                <button onclick="closeModal('modal-contact')" class="w-full text-[10px] font-bold text-slate-400 uppercase">VOLTAR</button>
            </div>

    <script>
        let products = [];
        let contacts = [];
        let sales = [];
        let cart = [];
        let config = { company: 'SBO GESTÃO', profitRate: 30, cnpj: '', ie: '', address: '', phone: '' };

        async function init() {
            setupCloudSync();
            switchTab('pos');
        }

        function setupCloudSync() {
            window.fs_snap(window.fs_coll(window.fs, "products"), (snap) => {
                products = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderPos();
                renderStock();
            });

            window.fs_snap(window.fs_coll(window.fs, "contacts"), (snap) => {
                contacts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderContactList('customer');
                renderContactList('supplier');
                updateCustomerSelect();
            });

            window.fs_snap(window.fs_coll(window.fs, "sales"), (snap) => {
                sales = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderFinance(window.currentFinanceFilter || 'all');
            });

            window.fs_snap(window.fs_coll(window.fs, "config"), (snap) => {
                snap.docs.forEach(doc => { config[doc.id] = doc.data().val; });
                document.getElementById('brand-name').innerText = config.company || 'SBO GESTÃO';
                document.getElementById('set-company').value = config.company || '';
                document.getElementById('set-cnpj').value = config.cnpj || '';
                document.getElementById('set-ie').value = config.ie || '';
                document.getElementById('set-address').value = config.address || '';
                document.getElementById('set-phone').value = config.phone || '';
                document.getElementById('set-profit-rate').value = config.profitRate || 30;
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('n-' + tab).classList.add('nav-active');
        }

        function renderPos() {
            const query = document.getElementById('pos-search').value.toLowerCase();
            document.getElementById('pos-products').innerHTML = products
                .filter(p => p.name.toLowerCase().includes(query))
                .map(p => `
                    <div onclick="addToCart('${p.id}')" class="pos-card shadow-sm active:scale-95">
                        <div class="text-[7px] font-black text-slate-400 uppercase truncate">${p.category}</div>
                        <h4 class="text-[9px] font-black truncate text-navy uppercase my-1">${p.name}</h4>
                        <p class="text-[9px] font-black text-amber-500">R$ ${p.price.toFixed(2)}</p>
                    </div>
                `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if(p.stock <= 0) return alert('Sem Estoque!');
            const item = cart.find(x => x.id === id);
            if(item) item.cQty++; else cart.push({...p, cQty: 1});
            renderCart();
        }

        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map((it, i) => `
                <div class="flex items-center justify-between bg-white/10 p-2 rounded-lg">
                    <div class="text-[9px]"><b class="uppercase">${it.name}</b><br>${it.cQty}x R$ ${it.price.toFixed(2)}</div>
                    <button onclick="cart.splice(${i},1);renderCart()" class="text-red-400 text-xs font-bold">X</button>
                </div>
            `).join('');
            const total = cart.reduce((s, x) => s + (x.price * x.cQty), 0);
            document.getElementById('cart-total').innerText = "R$ " + total.toFixed(2);
        }

        async function finishSale(method) {
            const total = cart.reduce((s, x) => s + (x.price * x.cQty), 0);
            const myRate = (parseFloat(config.profitRate) / 100);
            const bankRate = (3.09 / 100);
            let myPart = total * myRate;
            let profit = (method === 'Cartão') ? (myPart - (total * bankRate)) : myPart;

            const saleData = {
                date: new Date().toISOString(),
                method: method,
                total: total,
                profit: profit,
                customer: document.getElementById('cart-customer-select').value,
                items: cart.map(it => ({ name: it.name, price: it.price, qty: it.cQty }))
            };

            for(let it of cart) {
                const newStock = it.stock - it.cQty;
                await window.fs_upd(window.fs_doc(window.fs, "products", it.id), { stock: newStock });
            }

            await window.fs_add(window.fs_coll(window.fs, "sales"), saleData);
            cart = []; renderCart(); closeModal('modal-payment'); alert('Venda Realizada!');
        }

        async function voidSale(id) {
            if(confirm('⚠️ CANCELAR VENDA? Esta ação é irreversível e o estoque não voltará automaticamente.')) {
                await window.fs_del(window.fs_doc(window.fs, "sales", id));
            }
        }

        function renderStock() {
            document.getElementById('stock-list').innerHTML = products.map(p => `
                <div onclick="openProductModal('${p.id}')" class="bg-white p-4 rounded-2xl border flex items-center justify-between active:scale-95 transition-all">
                    <div><span class="text-[7px] font-black text-amber-500 uppercase">${p.category}</span><h4 class="font-bold text-xs uppercase text-navy">${p.name}</h4></div>
                    <div class="text-right"><p class="text-[9px] font-bold">R$ ${p.price.toFixed(2)}</p><b class="text-xs ${p.stock <= 5 ? 'text-red-500' : 'text-navy'}">${p.stock} Un.</b></div>
                </div>
            `).join('');
        }

        function openProductModal(id = null) {
            if(id) {
                const p = products.find(x => x.id === id);
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-sku').value = p.sku;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-cost').value = p.cost;
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-cat').value = p.category;
                document.getElementById('btn-delete-product').classList.remove('hidden');
            } else {
                document.getElementById('p-id').value = "";
                document.getElementById('p-sku').value = "REF-" + Date.now().toString().slice(-4);
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-cost').value = "";
                document.getElementById('p-stock').value = "0";
                document.getElementById('btn-delete-product').classList.add('hidden');
            }
            openModal('modal-product');
        }

        async function saveProduct() {
            const id = document.getElementById('p-id').value;
            const data = {
                sku: document.getElementById('p-sku').value,
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                cost: parseFloat(document.getElementById('p-cost').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                category: document.getElementById('p-cat').value
            };
            if(id) await window.fs_upd(window.fs_doc(window.fs, "products", id), data);
            else await window.fs_add(window.fs_coll(window.fs, "products"), data);
            closeModal('modal-product');
        }

        async function deleteProduct() {
            if(confirm('⚠️ EXCLUIR PRODUTO DEFINITIVAMENTE?')) {
                await window.fs_del(window.fs_doc(window.fs, "products", document.getElementById('p-id').value));
                closeModal('modal-product');
            }
        }

        function renderContactList(type) {
            const list = contacts.filter(c => c.type === type);
            const target = type === 'customer' ? 'customer-list' : 'supplier-list';
            document.getElementById(target).innerHTML = list.map(c => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                    <div><h4 class="font-bold text-xs uppercase">${c.name}</h4><p class="text-[9px] text-slate-400">${c.phone}</p></div>
                    <button onclick="deleteContact('${c.id}')" class="text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        async function deleteContact(id) {
            if(confirm('⚠️ EXCLUIR CONTATO?')) await window.fs_del(window.fs_doc(window.fs, "contacts", id));
        }

        function updateCustomerSelect() {
            const custs = contacts.filter(c => c.type === 'customer');
            document.getElementById('cart-customer-select').innerHTML = '<option value="0">Venda Rápida</option>' + custs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function saveContact() {
            const data = { name: document.getElementById('c-name').value, phone: document.getElementById('c-phone').value, type: document.getElementById('c-type').value };
            if(!data.name) return;
            await window.fs_add(window.fs_coll(window.fs, "contacts"), data);
            closeModal('modal-contact');
        }

        async function pickFromContacts() {
            try {
                if (!('contacts' in navigator)) return alert('Dispositivo não suporta acesso aos contatos.');
                const props = ['name', 'tel'];
                const contactsList = await navigator.contacts.select(props, { multiple: false });
                if (contactsList.length) {
                    if (contactsList[0].name) document.getElementById('c-name').value = contactsList[0].name[0];
                    if (contactsList[0].tel) document.getElementById('c-phone').value = contactsList[0].tel[0];
                }
            } catch (e) { console.error(e); }
        }

        function renderFinance(filter = 'all') {
            window.currentFinanceFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const btnMap = { 'all': 'f-all', 'Cartão': 'f-card', 'Dinheiro': 'f-cash', 'Pix': 'f-pix' };
            document.getElementById(btnMap[filter]).classList.add('active');

            let filteredSales = (filter === 'all') ? sales : sales.filter(s => s.method === filter);
            document.getElementById('fin-income').innerText = "R$ " + filteredSales.reduce((s, x) => s + x.total, 0).toFixed(2);
            document.getElementById('fin-profit').innerText = "R$ " + filteredSales.reduce((s, x) => s + x.profit, 0).toFixed(2);

            document.getElementById('sales-list-body').innerHTML = filteredSales.sort((a,b) => new Date(b.date) - new Date(a.date)).map(s => {
                return (s.items || []).map(it => `
                    <tr>
                        <td class="font-bold uppercase">${it.name}</td>
                        <td>${it.price.toFixed(2)}</td>
                        <td class="text-[8px] font-black">${s.method}</td>
                        <td>${new Date(s.date).toLocaleDateString('pt-BR')}</td>
                        <td class="font-bold">${s.total.toFixed(2)}</td>
                        <td class="text-green-600 font-bold">${s.profit.toFixed(2)}</td>
                        <td class="text-center"><button onclick="voidSale('${s.id}')" class="text-red-500 font-black">X</button></td>
                    </tr>
                `).join('');
            }).join('');
        }

        async function saveSettings() {
            const updates = [
                { id: "company", val: document.getElementById('set-company').value },
                { id: "cnpj", val: document.getElementById('set-cnpj').value },
                { id: "ie", val: document.getElementById('set-ie').value },
                { id: "address", val: document.getElementById('set-address').value },
                { id: "phone", val: document.getElementById('set-phone').value },
                { id: "profitRate", val: parseFloat(document.getElementById('set-profit-rate').value) }
            ];
            for(let item of updates) {
                await window.fs_set(window.fs_doc(window.fs, "config", item.id), { val: item.val });
            }
            alert('Dados Fiscal Sincronizados!');
        }

        function generatePDF() {
            const printWindow = window.open('', '_blank');
            const rows = document.getElementById('sales-list-body').innerHTML;
            
            // Kar kolonunu ve işlem kolonunu PDF'den kaldırmak için temizlik
            const cleanRows = rows.replace(/<td class="text-green-600 font-bold">.*?<\/td>/g, '')
                                 .replace(/<td class="text-center">.*?<\/td>/g, '');

            printWindow.document.write(`
                <html><head><title>Relatório Gerencial</title>
                <style>
                    body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 0; margin: 0; color: #0f172a; }
                    .letterhead { background: #0f172a; color: white; padding: 40px; border-bottom: 8px solid #fbbf24; }
                    .letterhead h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
                    .letterhead p { margin: 5px 0; font-size: 11px; opacity: 0.8; }
                    .content { padding: 40px; }
                    .doc-info { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
                    .doc-info div { font-size: 12px; font-weight: bold; text-transform: uppercase; }
                    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                    th { background: #f8fafc; color: #64748b; font-size: 10px; padding: 12px; text-align: left; border-bottom: 2px solid #edf2f7; text-transform: uppercase; }
                    td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 11px; }
                    .total-box { margin-top: 30px; background: #f8fafc; padding: 20px; border-radius: 15px; text-align: right; }
                    .total-box h2 { margin: 0; color: #0f172a; font-size: 20px; }
                    .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; font-size: 9px; color: #94a3b8; }
                </style></head>
                <body>
                    <div class="letterhead">
                        <h1>${config.company}</h1>
                        <p>CNPJ: ${config.cnpj} | Inscrição Estadual: ${config.ie}</p>
                        <p>${config.address}</p>
                        <p>Contato: ${config.phone}</p>
                    </div>
                    <div class="content">
                        <div class="doc-info">
                            <div>RELATÓRIO DE VENDAS</div>
                            <div>DATA: ${new Date().toLocaleDateString('pt-BR')}</div>
                        </div>
                        <table>
                            <thead><tr><th>NOME</th><th>PREÇO UNIT.</th><th>PAGAMENTO</th><th>DATA</th><th>TOTAL</th></tr></thead>
                            <tbody>${cleanRows}</tbody>
                        </table>
                        <div class="total-box">
                            <p style="font-size: 10px; margin: 0; font-weight: bold; color: #64748b;">VALOR TOTAL ACUMULADO</p>
                            <h2>${document.getElementById('fin-income').innerText}</h2>
                        </div>
                    </div>
                    <div class="footer">Este documento é um registro gerencial interno da empresa ${config.company}.</div>
                </body></html>
            `);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); }, 500);
        }

        function openModal(id) { document.getElementById(id).classList.add('modal-active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('modal-active'); }
        function clearCart() { cart = []; renderCart(); }
        function openPaymentModal() { if(cart.length) openModal('modal-payment'); }
        function openContactModal(type) { 
            document.getElementById('c-type').value = type; document.getElementById('c-name').value = ""; document.getElementById('c-phone').value = ""; 
            openModal('modal-contact'); 
        }
    </script>
</body>
</html>
