<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flight Price Intelligence</title>

<style>
:root{
  /* HIGH READABILITY PALETTE */
  --bg:#0e1624;
  --card:#ffffff;
  --text:#0f172a;
  --text-soft:#475569;
  --text-inv:#e5e7eb;

  --accent:#2563eb;
  --accent-soft:#dbeafe;

  --up:#15803d;
  --down:#b91c1c;

  --low:#dcfce7;
  --mid:#f8fafc;
  --high:#fee2e2;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text-inv);
}

/* HEADER */
.header{
  padding:14px;
  background:#111827;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.header h3{
  margin:0;
  font-size:18px;
  font-weight:900;
}

.small{
  font-size:12px;
  color:#cbd5e1;
}

.monthPicker{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:none;
  font-weight:700;
  font-size:14px;
}

/* CONTENT */
.container{ padding:12px }

/* ROUTE CARD */
.routeCard{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  margin-bottom:16px;
  box-shadow:0 12px 28px rgba(0,0,0,.3);
}

.title{
  font-weight:900;
  font-size:16px;
  color:var(--text);
}

.info{
  margin-top:6px;
  font-size:11px;
  color:var(--text-soft);
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}

.day{
  border-radius:14px;
  padding:8px 6px;
  text-align:center;
  cursor:pointer;
  transition:.15s;
  position:relative;
}

.day:hover{
  outline:2px solid var(--accent);
}

.hm-low{background:var(--low)}
.hm-mid{background:var(--mid)}
.hm-high{background:var(--high)}

.price{
  font-weight:900;
  font-size:13px;
  color:var(--text);
}

.cheapest{
  outline:2px solid var(--accent);
}

/* FLASH */
.flash-up{animation:up .6s}
.flash-down{animation:down .6s}

@keyframes up{0%{box-shadow:0 0 0 4px rgba(185,28,28,.5)}}
@keyframes down{0%{box-shadow:0 0 0 4px rgba(21,128,61,.5)}}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(14,22,36,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:white;
  border-radius:20px;
  padding:16px;
  width:94%;
  max-width:520px;
  color:var(--text);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.modalHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.closeBtn{
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  color:var(--text-soft);
}

.detailRow{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  font-size:14px;
}

.priceBox{
  background:var(--accent-soft);
  border-radius:14px;
  padding:12px;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

/* RESPONSIVE */
@media(min-width:700px){
  .calendar{grid-template-columns:repeat(7,1fr)}
  .header{flex-direction:row;justify-content:space-between;align-items:center}
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h3>✈️ Flight Price Intelligence</h3>
    <div class="small">Readable • Live pricing • Mobile-first</div>
  </div>
  <input type="month" id="monthPicker" class="monthPicker"/>
</div>

<div class="container">
  <div id="app"></div>
</div>

<div id="modal" class="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<script>
let usdTry=0;
let modalState=null;
const memory={};

async function fx(){
  const r=await fetch("https://open.er-api.com/v6/latest/USD");
  const d=await r.json();
  usdTry=d.rates.TRY;
}

const routes=[
 {name:"São Paulo (GRU) → Istanbul (IST)",base:720,airline:"Turkish Airlines",stop:"Direct / DOH",demand:1.1},
 {name:"Brasília (BSB) → Istanbul (IST)",base:690,airline:"LATAM + Turkish",stop:"1 Stop Europe",demand:.95}
];

let activeDate=new Date();

function price(b,d,dm){
  return b+
    Math.sin(d/6)*25+
    (Math.random()-.5)*20+
    dm*Math.cos(d/10)*30;
}

function openModal(state){
  modalState=state;
  renderModal();
  modal.style.display="flex";
}

function renderModal(){
  if(!modalState) return;
  const {r,label,usd,tryP}=modalState;
  modalContent.innerHTML=`
    <div class="modalHeader">
      <b>${r.name}</b>
      <div class="closeBtn" onclick="closeModal()">✕</div>
    </div>

    <div class="detailRow">
      <div>📅 ${label}</div>
      <div>✈ ${r.airline}</div>
      <div>🔁 ${r.stop}</div>
      <div>🛂 Türkiye – Vize Yok</div>
    </div>

    <div class="detailRow">
      <div class="priceBox">$${usd.toFixed(0)}</div>
      <div class="priceBox">₺${tryP.toFixed(0)}</div>
    </div>
  `;
}

function closeModal(){
  modal.style.display="none";
  modalState=null;
}

modal.onclick=closeModal;

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const y=activeDate.getFullYear();
  const m=activeDate.getMonth();
  const days=new Date(y,m+1,0).getDate();

  routes.forEach(r=>{
    const prices=[];
    for(let i=1;i<=days;i++) prices.push(price(r.base,i,r.demand));
    const min=Math.min(...prices);
    const max=Math.max(...prices);

    const card=document.createElement("div");
    card.className="routeCard";
    card.innerHTML=`
      <div class="title">${r.name}</div>
      <div class="info">${r.airline} • ${r.stop}</div>
      <div class="calendar"></div>
    `;
    app.appendChild(card);

    const cal=card.querySelector(".calendar");

    prices.forEach((usd,i)=>{
      const d=i+1;
      const date=new Date(y,m,d);
      const label=date.toLocaleDateString("en-US",{weekday:"short",day:"numeric"});
      const tryP=usd*usdTry;
      const key=r.name+y+m+d;
      const prev=memory[key];
      memory[key]=usd;

      let heat="hm-mid";
      if(usd===min) heat="hm-low";
      if(usd===max) heat="hm-high";

      const div=document.createElement("div");
      div.className=`day ${heat}`;
      if(usd===min) div.classList.add("cheapest");
      if(prev){
        if(usd>prev) div.classList.add("flash-up");
        if(usd<prev) div.classList.add("flash-down");
      }

      const arrow=prev?(usd>prev?"▲ ":usd<prev?"▼ ":""):"";

      div.innerHTML=`
        <div>${label}</div>
        <div class="price">${arrow}$${usd.toFixed(0)}</div>
        <div class="price">₺${tryP.toFixed(0)}</div>
      `;

      div.onclick=()=>openModal({r,label,usd,tryP});
      cal.appendChild(div);

      if(modalState && modalState.label===label && modalState.r.name===r.name){
        modalState.usd=usd;
        modalState.tryP=tryP;
        renderModal();
      }
    });
  });
}

const mp=document.getElementById("monthPicker");
mp.value=new Date().toISOString().slice(0,7);
mp.onchange=()=>{activeDate=new Date(mp.value);render();};

async function start(){await fx();render();}
start();
setInterval(start,30000);
</script>

</body>
</html>
