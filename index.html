<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="theme-color" content="#0066cc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brezilya Robusta | Ultimate Trading Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #0066cc;
  --primary-dark: #0052a3;
  --primary-light: #e8f0fe;
  --gray-50: #f8f9fc;
  --gray-100: #f1f3f8;
  --gray-200: #e4e8f0;
  --gray-300: #d1d8e6;
  --gray-600: #5a6e8a;
  --gray-700: #3a4a66;
  --gray-900: #1a2a3e;
  --white: #ffffff;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --gold: #d4af37;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #06b6d4;
}

[data-theme="dark"] {
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-light: #1e3a5f;
  --gray-50: #1a1a2e;
  --gray-100: #16213e;
  --gray-200: #2d2d44;
  --gray-300: #3a3a5a;
  --gray-600: #a0a0c0;
  --gray-700: #c0c0e0;
  --gray-900: #e0e0f0;
  --white: #0f0f23;
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  transition: background 0.3s, color 0.3s;
}

/* TEMA GEÇİŞİ */
.theme-transition {
  transition: all 0.3s ease;
}

/* HEADER */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header-content {
  max-width: 1280px;
  margin: 0 auto;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; }
.logo-text h1 { font-size: 1rem; font-weight: 700; color: var(--gray-900); }
.logo-text p { font-size: 0.55rem; color: var(--gray-600); }

.header-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-outline { background: transparent; border: 1px solid var(--gray-300); padding: 8px 14px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray-700); cursor: pointer; transition: all 0.2s; }
.btn-outline:hover { background: var(--gray-100); border-color: var(--primary); color: var(--primary); }
.btn-primary { background: var(--primary); border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s; }
.btn-primary:hover { background: var(--primary-dark); transform: scale(1.02); }
.btn-success { background: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; cursor: pointer; }
.btn-warning { background: var(--warning); color: var(--gray-900); border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; cursor: pointer; }

/* CONTAINER */
.container { max-width: 1280px; margin: 0 auto; padding: 20px; padding-bottom: 90px; }

/* STATS BANNER */
.stats-banner { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 20px; padding: 20px; margin-bottom: 24px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; animation: fadeIn 0.5s ease; }
.stats-info h3 { font-size: 0.7rem; font-weight: 500; opacity: 0.8; letter-spacing: 0.5px; }
.stats-info h2 { font-size: 1.3rem; font-weight: 700; }
.stats-info p { font-size: 0.65rem; opacity: 0.8; margin-top: 6px; }
.update-badge { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; }

/* DASHBOARD KARTLARI */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.dash-card { background: var(--white); border-radius: 16px; padding: 16px; text-align: center; border: 1px solid var(--gray-200); transition: transform 0.2s; cursor: pointer; }
.dash-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
.dash-card .value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
.dash-card .label { font-size: 0.6rem; color: var(--gray-600); margin-top: 6px; text-transform: uppercase; }

/* AYARLAR MODALI */
.settings-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 200; visibility: hidden; opacity: 0; transition: all 0.3s; }
.settings-modal.open { visibility: visible; opacity: 1; }
.settings-panel { background: var(--white); border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; padding: 24px 20px; transform: translateY(100%); transition: transform 0.3s ease; max-height: 85vh; overflow-y: auto; }
.settings-modal.open .settings-panel { transform: translateY(0); }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-200); }
.params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* FİLTRE */
.filter-section { margin-bottom: 20px; }
.filter-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: thin; padding-bottom: 8px; }
.filter-chip { background: var(--white); border: 1px solid var(--gray-200); padding: 8px 18px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; color: var(--gray-700); white-space: nowrap; cursor: pointer; transition: all 0.2s; }
.filter-chip:hover { border-color: var(--primary); color: var(--primary); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

/* AKSİYON BAR */
.action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.sort-group { display: flex; gap: 8px; }
.sort-btn { background: var(--white); border: 1px solid var(--gray-200); padding: 6px 14px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; color: var(--gray-700); cursor: pointer; }
.fav-btn { background: var(--white); border: 1px solid var(--gray-200); padding: 6px 14px; border-radius: 8px; font-size: 0.65rem; font-weight: 600; cursor: pointer; }
.fav-btn.active { background: var(--gold); border-color: var(--gold); }

/* ÜRÜN GRID */
.products-grid { display: grid; grid-template-columns: 1fr; gap: 16px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@media (min-width: 768px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }

.product-card { background: var(--white); border-radius: 16px; padding: 20px; border: 1px solid var(--gray-200); transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); cursor: pointer; position: relative; overflow: hidden; }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
.product-card.p1 { border-top: 3px solid var(--gold); }
.product-card.p2 { border-top: 3px solid var(--success); }
.product-card.p3 { border-top: 3px solid var(--purple); }
.product-card.p4 { border-top: 3px solid var(--warning); }
.product-card.p5 { border-top: 3px solid var(--error); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.coc-name { font-size: 1rem; font-weight: 700; color: var(--gray-900); }
.fav-star { font-size: 1rem; cursor: pointer; color: var(--gray-300); transition: all 0.2s; }
.fav-star.active { color: var(--gold); text-shadow: 0 0 4px rgba(212,175,55,0.5); }
.priority-badge { font-size: 0.55rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--gray-100); color: var(--gray-700); }

.price-main { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); margin: 12px 0; }
.price-main small { font-size: 0.65rem; font-weight: 500; color: var(--gray-600); }

.price-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; padding: 12px 0; border-top: 1px solid var(--gray-200); border-bottom: 1px solid var(--gray-200); }
.detail-item { display: flex; justify-content: space-between; align-items: center; }
.detail-item .label { font-size: 0.6rem; font-weight: 500; color: var(--gray-600); }
.detail-item .value { font-size: 0.7rem; font-weight: 700; color: var(--gray-900); }

.total-badge { background: var(--gray-50); padding: 10px; border-radius: 12px; margin-top: 12px; text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--primary); }

/* ALT NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-200); padding: 8px 16px; z-index: 100; }
.nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-around; }
.nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.55rem; font-weight: 600; color: var(--gray-600); cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
.nav-item:hover { background: var(--gray-100); color: var(--primary); }

/* MODAL */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
.modal-container { background: var(--white); border-radius: 20px; padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-container input, .modal-container select, .modal-container textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 10px; margin: 8px 0; font-family: inherit; background: var(--white); color: var(--gray-900); }

/* GRAFİK MODAL */
.chart-container { max-width: 400px; margin: 0 auto; }

/* TOAST */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: white; padding: 10px 20px; border-radius: 10px; font-size: 0.7rem; z-index: 500; animation: fadeOut 2s ease forwards; }
@keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

/* SESLİ KOMUT */
.voice-active { background: var(--success); color: white; animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

/* ROZET */
.badge-earned { position: absolute; top: -5px; right: -5px; background: var(--gold); color: var(--gray-900); border-radius: 20px; padding: 4px 8px; font-size: 0.6rem; font-weight: bold; animation: bounce 0.5s ease; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

/* PULL-TO-REFRESH */
.pull-indicator { text-align: center; padding: 10px; font-size: 0.6rem; color: var(--gray-600); display: none; }

.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">🇧🇷</div>
      <div class="logo-text">
        <h1>Brezilya Robusta</h1>
        <p id="dailyQuote">☕ Premium kahve ticaret platformu</p>
      </div>
    </div>
    <div class="header-buttons">
      <button class="btn-outline" onclick="toggleTheme()">🌙 Tema</button>
      <button class="btn-outline" onclick="openSettings()">⚙️ Ayarlar</button>
      <button class="btn-primary" id="modeBtn" onclick="toggleMode()">👤 Müşteri</button>
    </div>
  </div>
</header>

<div class="container">
  <!-- STATS BANNER -->
  <div class="stats-banner">
    <div class="stats-info">
      <h3 id="greeting">HOŞ GELDİNİZ</h3>
      <h2>Brezilya <span style="color: var(--gold);">Robusta</span></h2>
      <p>Güney Amerika'nın en kaliteli robusta kahveleri</p>
    </div>
    <div class="update-badge" id="bannerLastUpdate">--</div>
  </div>

  <!-- DASHBOARD KARTLARI -->
  <div class="dashboard-grid">
    <div class="dash-card" onclick="showMostViewed()">
      <div class="value" id="mostViewedCount">0</div>
      <div class="label">👁️ En Çok Bakılan</div>
    </div>
    <div class="dash-card" onclick="showMostProfitable()">
      <div class="value" id="mostProfitable">0%</div>
      <div class="label">💰 En Karlı Ürün</div>
    </div>
    <div class="dash-card" onclick="showGoalStatus()">
      <div class="value" id="goalProgress">0%</div>
      <div class="label">🎯 Hedef Durumu</div>
    </div>
    <div class="dash-card" onclick="showTodayDeal()">
      <div class="value" id="todayDeal">-</div>
      <div class="label">⭐ Günün Fırsatı</div>
    </div>
  </div>

  <!-- FİLTRE -->
  <div class="filter-section">
    <div class="filter-scroll" id="filterTabs">
      <div class="filter-chip active" data-priority="all">Tümü</div>
      <div class="filter-chip" data-priority="1">P1 ⭐</div>
      <div class="filter-chip" data-priority="2">P2</div>
      <div class="filter-chip" data-priority="3">P3</div>
      <div class="filter-chip" data-priority="4">P4</div>
      <div class="filter-chip" data-priority="5">P5</div>
    </div>
  </div>

  <!-- AKSİYON BAR -->
  <div class="action-bar">
    <div class="sort-group">
      <button class="sort-btn" onclick="setSort('priority')">📌 Öncelik</button>
      <button class="sort-btn" onclick="setSort('price')">💰 Fiyat</button>
      <button class="sort-btn" onclick="setSort('profit')">📈 Karlılık</button>
    </div>
    <div>
      <button class="fav-btn" id="favFilterBtn" onclick="toggleFavFilter()">⭐ Favoriler</button>
      <button class="fav-btn" onclick="openRandomProduct()">🎲 Rastgele</button>
      <button class="fav-btn" onclick="startVoiceCommand()">🎤 Sesli</button>
    </div>
  </div>

  <!-- ÜRÜN GRID -->
  <div class="products-grid" id="productsGrid"></div>
  <div class="pull-indicator" id="pullIndicator">⬇️ Aşağı çekerek yenileyin</div>
</div>

<!-- ALT NAV -->
<div class="bottom-nav">
  <div class="nav-container">
    <button class="nav-item" onclick="scrollToTop()"><span>🏠</span><span>Ana</span></button>
    <button class="nav-item" onclick="scrollToProducts()"><span>☕</span><span>Ürünler</span></button>
    <button class="nav-item" onclick="generatePDF()"><span>📄</span><span>PDF</span></button>
    <button class="nav-item" onclick="openHistory()"><span>📜</span><span>Geçmiş</span></button>
    <button class="nav-item" onclick="openDashboard()"><span>📊</span><span>Analiz</span></button>
    <button class="nav-item" onclick="openEditor()"><span>✎</span><span>Yönetim</span></button>
  </div>
</div>

<script>
// ============ VERİLER ============
let cocData = [
  { coc: 'COC-01', p: 1, rs: 1915, viewCount: 0, tags: ['premium', 'yeni'] },
  { coc: 'COC-02', p: 1, rs: 1905, viewCount: 0, tags: ['premium'] },
  { coc: 'COC-03', p: 1, rs: 1895, viewCount: 0, tags: ['kampanya'] },
  { coc: 'COC-04', p: 2, rs: 1885, viewCount: 0, tags: [] },
  { coc: 'COC-05', p: 2, rs: 1845, viewCount: 0, tags: [] },
  { coc: 'COC-06', p: 2, rs: 1662, viewCount: 0, tags: ['fırsat'] },
  { coc: 'COC-07', p: 3, rs: 1630, viewCount: 0, tags: [] },
  { coc: 'COC-08', p: 3, rs: 1615, viewCount: 0, tags: [] },
  { coc: 'COC-09', p: 4, rs: 1477, viewCount: 0, tags: [] },
  { coc: 'COC-10', p: 4, rs: 1442, viewCount: 0, tags: [] },
  { coc: 'COC-11', p: 4, rs: 1320, viewCount: 0, tags: [] },
  { coc: 'COC-12', p: 4, rs: 1257, viewCount: 0, tags: [] },
  { coc: 'COC-13', p: 5, rs: 870, viewCount: 0, tags: [] },
  { coc: 'COC-14', p: 5, rs: 870, viewCount: 0, tags: [] },
  { coc: 'COC-15', p: 5, rs: 750, viewCount: 0, tags: ['limited'] },
  { coc: 'COC-16', p: 5, rs: 630, viewCount: 0, tags: [] }
];

let salesMode = false;
let currentFilter = 'all';
let currentSort = 'priority';
let showOnlyFav = false;
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let offerHistory = JSON.parse(localStorage.getItem('offerHistory') || '[]');
let viewHistory = JSON.parse(localStorage.getItem('viewHistory') || '[]');
let monthlyTarget = JSON.parse(localStorage.getItem('monthlyTarget') || '{"target":500000,"current":0}');
let badges = JSON.parse(localStorage.getItem('badges') || '[]');
let lastVoiceCommand = '';
let recognition = null;

// ============ FİYAT HESAPLAMA ============
function calcPrices(rs, usdbrl, usdtry, freight, taxRate, profit) {
  let usdkg = (rs / 60) / usdbrl;
  let fobTon = (usdkg * usdtry) * 1000;
  let cifTon = ((usdkg + freight) * usdtry) * 1000;
  let ddpTon = cifTon * (1 + taxRate / 100);
  let sellTon = ddpTon + (profit * 1000);
  let marginPct = (profit * 1000) / ddpTon * 100;
  return { fobTon, cifTon, ddpTon, sellTon, marginPct };
}

// ============ TEMA ============
function toggleTheme() {
  const html = document.documentElement;
  const currentTheme = html.getAttribute('data-theme');
  if (currentTheme === 'dark') {
    html.removeAttribute('data-theme');
    localStorage.setItem('theme', 'light');
    showToast('🌞 Aydınlık tema aktif');
  } else {
    html.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
    showToast('🌙 Karanlık tema aktif');
  }
}

// ============ GÜNÜN SÖZÜ ============
const quotes = [
  "☕ Kahve, düşüncenin kahvesidir.",
  "🌟 Her fincan yeni bir başlangıçtır.",
  "💪 Robusta, gücün ve enerjinin kaynağıdır.",
  "🌱 Kaliteli kahve, kaliteli hayattır.",
  "🤝 Brezilya'dan dünyaya kahve sevgisi.",
  "📈 Fırsatları kaçırmayın, hemen teklif alın!",
  "🎯 Hedeflerinize ulaşmak için doğru adres.",
  "✨ Premium kalite, uygun fiyat."
];
setInterval(() => {
  const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('dailyQuote').innerHTML = randomQuote;
}, 30000);

// ============ KARŞILAMA MESAJI ============
const hour = new Date().getHours();
let greeting = '';
if (hour < 12) greeting = '🌅 GÜNAYDIN';
else if (hour < 18) greeting = '☀️ İYİ GÜNLER';
else greeting = '🌙 İYİ AKŞAMLAR';
document.getElementById('greeting').innerHTML = greeting;

// ============ CANLI DÖVİZ ============
async function fetchLiveRates() {
  showToast('Döviz kurları güncelleniyor...');
  try {
    const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await response.json();
    if (data.rates.BRL) document.getElementById('usdbrl').value = data.rates.BRL.toFixed(4);
    if (data.rates.TRY) document.getElementById('usdtry').value = data.rates.TRY.toFixed(4);
    const timeStr = new Date().toLocaleTimeString('tr-TR');
    document.getElementById('lastUpdate').innerHTML = `Son güncelleme: ${timeStr}`;
    document.getElementById('bannerLastUpdate').innerHTML = timeStr;
    showToast('Kurlar güncellendi');
    render();
    checkAndAwardBadge('firstUpdate');
  } catch(e) { showToast('API hatası, manuel giriş yapabilirsiniz'); }
}
setInterval(fetchLiveRates, 300000);

// ============ FAVORİ ============
function toggleFavorite(cocName) {
  if (favorites.includes(cocName)) {
    favorites = favorites.filter(f => f !== cocName);
  } else {
    favorites.push(cocName);
    checkAndAwardBadge('firstFavorite');
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  render();
}

function toggleFavFilter() {
  showOnlyFav = !showOnlyFav;
  document.getElementById('favFilterBtn').classList.toggle('active', showOnlyFav);
  render();
}

// ============ ROZET SİSTEMİ ============
function checkAndAwardBadge(badgeId) {
  const badgeMap = {
    firstUpdate: { name: '📡 İlk Güncelleme', desc: 'Döviz kurunu ilk kez güncelledin' },
    firstFavorite: { name: '⭐ İlk Favori', desc: 'İlk ürününü favoriledin' },
    firstPDF: { name: '📄 İlk Teklif', desc: 'İlk PDF teklifini oluşturdun' },
    tenProducts: { name: '🏆 10 Ürün', desc: '10 farklı ürünü favoriledin' },
    master: { name: '👑 Master', desc: 'Tüm rozetleri topladın' }
  };
  if (!badges.includes(badgeId)) {
    badges.push(badgeId);

function saveToHistory() {
  let usdbrl = parseFloat(document.getElementById('usdbrl').value);
  let usdtry = parseFloat(document.getElementById('usdtry').value);
  let ton = parseFloat(document.getElementById('ton').value);
  let total = 0;

  offerHistory.unshift({ date: new Date().toISOString(), total, usdbrl, usdtry, ton });
  if (offerHistory.length > 20) offerHistory.pop();

  monthlyTarget.current += total;

function openHistory() {
  if (!offerHistory.length) { showToast('Henüz teklif geçmişi bulunmuyor'); return; }
  let modal = document.createElement('div');
  modal.className = 'modal-overlay';
  let html = `<div class="modal-container"><h3>📜 Teklif Geçmişi (Son 20)</h3>`;
  offerHistory.forEach((h, idx) => {
    html += `<div style="background:var(--gray-100);padding:12px;border-radius:12px;margin-bottom:10px;cursor:pointer;" onclick="loadHistory(${idx})"><div style="font-size:0.65rem;color:var(--primary);">${new Date(h.date).toLocaleString('tr-TR')}</div><div style="font-weight:700;">₺ ${Math.round(h.total).toLocaleString()}</div><div style="font-size:0.6rem;">USD/BRL: ${h.usdbrl} | ${h.ton} ton</div></div>`;
  });

// ============ SESLİ KOMUT ============
function startVoiceCommand() {
  if (!('webkitSpeechRecognition' in window)) { showToast('Sesli komut tarayıcınızda desteklenmiyor'); return; }
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'tr-TR';
  recognition.onresult = (event) => {
    let command = event.results[0][0].transcript.toLowerCase();
    showToast(`🎤 "${command}"`);
    if (command.includes('fiyat') || command.includes('göster')) { showToast('Fiyatlar gösteriliyor'); scrollToProducts(); }
    else if (command.includes('karanlık') || command.includes('dark')) { toggleTheme(); }
    else if (command.includes('aydınlık') || command.includes('light')) { toggleTheme(); }
    else if (command.includes('pdf') || command.includes('teklif')) { generatePDF(); }
    else if (command.includes('favori') || command.includes('yıldız')) { toggleFavFilter(); }
    else { showToast('Komut anlaşılamadı. Deneyebileceğiniz komutlar: fiyat göster, karanlık tema, pdf oluştur, favorileri göster'); }
  };
  recognition.start();
  document.getElementById('modeBtn').classList.add('voice-active');
  setTimeout(() => document.getElementById('modeBtn').classList.remove('voice-active'), 5000);
}

  if (window.navigator && window.navigator.vibrate) {
    window.navigator.vibrate(50);
  }
}

// ============ PULL-TO-REFRESH ============
let touchStartY = 0;
document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
document.addEventListener('touchmove', (e) => {
  let touchEndY = e.touches[0].clientY;
  if (touchEndY - touchStartY > 80 && window.scrollY === 0) {
    document.getElementById('pullIndicator').style.display = 'block';
  }
});
document.addEventListener('touchend', () => {
  if (document.getElementById('pullIndicator').style.display === 'block') {
    location.reload();
  }
});

// ============ RENDER ============
function render() {
  let usdbrl = parseFloat(document.getElementById('usdbrl').value) || 1;
  let usdtry = parseFloat(document.getElementById('usdtry').value) || 1;
  let freight = parseFloat(document.getElementById('freight').value) || 0;
  let taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
  let profit = parseFloat(document.getElementById('profit').value) || 0;
  let ton = parseFloat(document.getElementById('ton').value) || 0;

  let filtered = [...cocData];
  if (currentFilter !== 'all') filtered = filtered.filter(c => c.p == currentFilter);
  if (showOnlyFav) filtered = filtered.filter(c => favorites.includes(c.coc));
  if (currentSort === 'price') filtered.sort((a, b) => calcPrices(a.rs, usdbrl, usdtry, freight, taxRate, profit).sellTon - calcPrices(b.rs, usdbrl, usdtry, freight, taxRate, profit).sellTon);
  else if (currentSort === 'profit') filtered.sort((a, b) => calcPrices(b.rs, usdbrl, usdtry, freight, taxRate, profit).marginPct - calcPrices(a.rs, usdbrl, usdtry, freight, taxRate, profit).marginPct);
  else filtered.sort((a, b) => a.p - b.p || b.rs - a.rs);

  let container = document.getElementById('productsGrid');
  container.innerHTML = '';
  filtered.forEach(c => {
    c.viewCount++;
    let p = calcPrices(c.rs, usdbrl, usdtry, freight, taxRate, profit);
    let isFav = favorites.includes(c.coc);
    let totalAmount = p.sellTon * ton;
    container.innerHTML += `
      <div class="product-card p${c.p}" id="${c.coc}" onclick="hapticFeedback();showToast('${c.coc} seçildi')">
        <div class="card-header">
          <span class="coc-name">${c.coc} ${c.tags.includes('fırsat') ? '🔥' : ''} ${c.tags.includes('yeni') ? '🆕' : ''}</span>
          <div class="card-actions">
            <span class="fav-star ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${c.coc}')">${isFav ? '★' : '☆'}</span>
            <span class="priority-badge">PRIORITY ${c.p}</span>
          </div>
        </div>
        <div class="price-main">₺ ${Math.round(p.sellTon).toLocaleString()}<small> / TON</small></div>
        <div class="price-details ${salesMode ? 'hidden' : ''}">
          <div class="detail-item"><span class="label">📦 FOB</span><span class="value">₺ ${Math.round(p.fobTon).toLocaleString()}</span></div>
          <div class="detail-item"><span class="label">🚢 CIF</span><span class="value">₺ ${Math.round(p.cifTon).toLocaleString()}</span></div>
          <div class="detail-item"><span class="label">🏭 DDP</span><span class="value">₺ ${Math.round(p.ddpTon).toLocaleString()}</span></div>
          <div class="detail-item"><span class="label">📈 Kâr Marjı</span><span class="value">%${p.marginPct.toFixed(1)}</span></div>
        </div>
        ${ton > 0 ? `<div class="total-badge">💰 ${ton} TON TOPLAM: ₺ ${Math.round(totalAmount).toLocaleString()}</div>` : ''}
      </div>
    `;
  });
  localStorage.setItem('viewHistory', JSON.stringify(cocData.map(c => ({ coc: c.coc, viewCount: c.viewCount }))));
  let mostViewedCount = Math.max(...cocData.map(c => c.viewCount));
  document.getElementById('mostViewedCount').innerHTML = mostViewedCount;
  let mostProfitable = Math.max(...filtered.map(c => calcPrices(c.rs, usdbrl, usdtry, freight, taxRate, profit).marginPct));
  document.getElementById('mostProfitable').innerHTML = mostProfitable.toFixed(1) + '%';
  let goalProgress = (monthlyTarget.current / monthlyTarget.target * 100).toFixed(1);
  document.getElementById('goalProgress').innerHTML = goalProgress + '%';
  showTodayDeal();
  document.getElementById('modeBtn').innerHTML = salesMode ? '👑 Satış Modu' : '👤 Müşteri Modu';
}

  window.resetCoc = () => { cocData = [ { coc: 'COC-01', p: 1, rs: 1915, viewCount: 0, tags: [] }, { coc: 'COC-02', p: 1, rs: 1905, viewCount: 0, tags: [] }, { coc: 'COC-03', p: 1, rs: 1895, viewCount: 0, tags: [] }, { coc: 'COC-04', p: 2, rs: 1885, viewCount: 0, tags: [] }, { coc: 'COC-05', p: 2, rs: 1845, viewCount: 0, tags: [] }, { coc: 'COC-06', p: 2, rs: 1662, viewCount: 0, tags: [] }, { coc: 'COC-07', p: 3, rs: 1630, viewCount: 0, tags: [] }, { coc: 'COC-08', p: 3, rs: 1615, viewCount: 0, tags: [] }, { coc: 'COC-09', p: 4, rs: 1477, viewCount: 0, tags: [] }, { coc: 'COC-10', p: 4, rs: 1442, viewCount: 0, tags: [] }, { coc: 'COC-11', p: 4, rs: 1320, viewCount: 0, tags: [] }, { coc: 'COC-12', p: 4, rs: 1257, viewCount: 0, tags: [] }, { coc: 'COC-13', p: 5, rs: 870, viewCount: 0, tags: [] }, { coc: 'COC-14', p: 5, rs: 870, viewCount: 0, tags: [] }, { coc: 'COC-15', p: 5, rs: 750, viewCount: 0, tags: [] }, { coc: 'COC-16', p: 5, rs: 630, viewCount: 0, tags: [] } ]; localStorage.removeItem('cocData'); render(); modal.remove(); showToast('Varsayılan verilere dönüldü'); };
  window.backupData = () => { let backup = { cocData, favorites, offerHistory, monthlyTarget, badges }; let blob = new Blob([JSON.stringify(backup)], {type: 'application/json'}); let url = URL.createObjectURL(blob); let a = document.createElement('a'); a.href = url; a.download = `backup_${new Date().toLocaleDateString('tr-TR')}.json`; a.click(); showToast('Yedek alındı'); };
  window.restoreData = () => { let input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (evt) => { let backup = JSON.parse(evt.target.result); if(backup.cocData) cocData = backup.cocData; if(backup.favorites) favorites = backup.favorites; if(backup.offerHistory) offerHistory = backup.offerHistory; if(backup.monthlyTarget) monthlyTarget = backup.monthlyTarget; if(backup.badges) badges = backup.badges; localStorage.setItem('cocData', JSON.stringify(cocData)); localStorage.setItem('favorites', JSON.stringify(favorites)); localStorage.setItem('offerHistory', JSON.stringify(offerHistory)); localStorage.setItem('monthlyTarget', JSON.stringify(monthlyTarget)); localStorage.setItem('badges', JSON.stringify(badges)); render(); showToast('Yedek geri yüklendi'); modal.remove(); }; reader.readAsText(file); }; input.click(); };
}

// ============ INIT ============
let saved = localStorage.getItem('cocData');
if (saved) cocData = JSON.parse(saved);
let savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
document.querySelectorAll('.filter-chip').forEach(el => el.addEventListener('click', () => setFilter(el.dataset.priority)));
['usdbrl','usdtry','freight','taxRate','profit','ton'].forEach(id => { let el = document.getElementById(id); if(el) el.addEventListener('input', () => render()); });
fetchLiveRates();
render();
</script>
