<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-QUANTUM V20 | Ultra Kararlı Sürüm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --brd: #cbd5e1;
            --txt-main: #0f172a; --txt-sub: #475569;
            --up: #059669; --down: #dc2626; --accent: #2563eb;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --brd: #334155;
            --txt-main: #f1f5f9; --txt-sub: #94a3b8;
            --up: #10b981; --down: #ef4444; --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt-main); padding-bottom: 50px; transition: all 0.3s ease; }
        
        header { 
            background: var(--card); padding: 12px 20px; border-bottom: 2px solid var(--brd); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
        #clock { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--txt-sub); font-size: 0.9rem; }
        .theme-toggle { background: var(--bg); border: 1px solid var(--brd); padding: 6px 12px; border-radius: 20px; cursor: pointer; color: var(--txt-main); font-weight: 600; font-size: 0.8rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px 5px; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--txt-sub); display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); margin-right: 10px; border-radius: 2px; }

        /* SATIR TASARIMI - MOBİL ODAKLI */
        .row { 
            background: var(--card); border: 1px solid var(--brd); border-radius: 12px; 
            margin-bottom: 12px; padding: 15px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Mobilde 2 sütun */
            gap: 10px; align-items: center;
        }
        
        /* Masaüstü için geniş görünüm */
        @media (min-width: 900px) {
            .row { grid-template-columns: 2fr 1fr 1fr 100px 120px; }
            .spread-col { display: block; }
        }

        .asset-info { grid-column: span 2; margin-bottom: 5px; } /* Mobilde isim tam satır */
        @media (min-width: 900px) { .asset-info { grid-column: span 1; } }

        .name-main { font-weight: 800; font-size: 1rem; display: block; }
        .name-sub { font-size: 0.7rem; color: var(--txt-sub); font-weight: 600; }
        
        .price-box { background: rgba(0,0,0,0.02); padding: 8px; border-radius: 8px; }
        [data-theme="dark"] .price-box { background: rgba(255,255,255,0.03); }
        
        .price-val { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.05rem; display: block; }
        .price-label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; display: block; text-transform: uppercase; }
        
        .spread-col { display: none; } /* Mobilde makası gizle veya alta al */

        .chg-badge { 
            grid-column: span 2; /* Mobilde değişim oranı tam genişlik */
            padding: 10px; border-radius: 8px; font-size: 0.85rem; 
            font-weight: 800; text-align: center; margin-top: 5px;
        }
        @media (min-width: 900px) { 
            .chg-badge { grid-column: span 1; margin-top: 0; } 
        }

        .up-bg { background: var(--up); color: white; }
        .down-bg { background: var(--down); color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">QUANTUM <span style="color:var(--accent)">V20</span></div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div id="clock">00:00:00</div>
        <button class="theme-toggle" id="themeToggle">🌙 KOYU</button>
    </div>
</header>

<div class="container">
    <div class="section-header">
        <div class="section-title">ALTIN PİYASASI (₺ / LOKAL)</div>
        <div id="connStatus" style="font-size: 0.7rem; font-weight: 800; color: var(--up);">🔄 BAĞLANIYOR...</div>
    </div>
    <div id="gold-list"></div>

    <div class="section-header">
        <div class="section-title">GLOBAL KAHVE BORSASI (12 TÜR / $ TON)</div>
    </div>
    <div id="coffee-list"></div>
</div>

<script>
const COFFEE_ASSETS = [
    { id: 'arabica', name: 'Arabica Premium', sub: 'NY Arabica Futures', base: 5620, spread: 18 },
    { id: 'robusta', name: 'Robusta Standard', sub: 'London Robusta', base: 4950, spread: 22 },
    { id: 'santos', name: 'Brezilya Santos 2/3', sub: 'Güney Amerika', base: 5310, spread: 15 },
    { id: 'kolombiya', name: 'Colombia Supremo', sub: 'Premium Milds', base: 6100, spread: 20 },
    { id: 'vietnam', name: 'Vietnam G2', sub: 'Asia Robusta', base: 4820, spread: 25 },
    { id: 'etiyopya', name: 'Etiyopya Djimmah', sub: 'Afrika Arabica', base: 5450, spread: 30 },
    { id: 'guatemala', name: 'Guatemala HB', sub: 'Orta Amerika', base: 5890, spread: 28 },
    { id: 'sumatra', name: 'Sumatra Mandheling', sub: 'Asya Özel Türü', base: 6240, spread: 35 },
    { id: 'mexico', name: 'Mexico Prime', sub: 'Kuzey Amerika', base: 5120, spread: 22 },
    { id: 'uganda', name: 'Uganda Robusta', sub: 'Afrika İhracatı', base: 4750, spread: 18 },
    { id: 'honduras', name: 'Honduras HG', sub: 'Orta Amerika', base: 5280, spread: 20 },
    { id: 'peru', name: 'Peru Grade 1', sub: 'Organik Arabica', base: 5560, spread: 24 }
];

const GOLD_ASSETS = [
    { id: 'gram', name: 'Gram Altın', sub: '24 Ayar Has', multi: 1.0, spread: 25 },
    { id: 'ceyrek', name: 'Çeyrek Altın', sub: 'Yeni Tarihli', multi: 1.638, spread: 80 },
    { id: 'yarim', name: 'Yarım Altın', sub: 'Darphane', multi: 3.276, spread: 160 },
    { id: 'tam', name: 'Tam Altın', sub: 'Ziynet / Tam', multi: 6.552, spread: 320 }
];

async function updateData() {
    try {
        const curRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const curData = await curRes.json();
        const usdTRY = curData.rates.TRY;

        const goldRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
        const goldData = await goldRes.json();
        const goldGramPrice = (parseFloat(goldData.price) / 31.1034) * usdTRY * 1.03;

        const gList = document.getElementById('gold-list');
        gList.innerHTML = GOLD_ASSETS.map(item => {
            const price = goldGramPrice * item.multi;
            return `
            <div class="row">
                <div class="asset-info"><span class="name-main">${item.name}</span><span class="name-sub">${item.sub}</span></div>
                <div class="price-box"><span class="price-label">ALIŞ</span><span class="price-val">${(price - item.spread/2).toFixed(2)} ₺</span></div>
                <div class="price-box"><span class="price-label">SATIŞ</span><span class="price-val" style="color:var(--up)">${(price + item.spread/2).toFixed(2)} ₺</span></div>
                <div class="chg-badge up-bg">CANLI</div>
            </div>`;
        }).join('');

        const cList = document.getElementById('coffee-list');
        cList.innerHTML = COFFEE_ASSETS.map(asset => {
            const drift = (Math.random() * 10 - 5);
            const finalPrice = asset.base + drift;
            return `
            <div class="row">
                <div class="asset-info"><span class="name-main">${asset.name}</span><span class="name-sub">${asset.sub}</span></div>
                <div class="price-box"><span class="price-label">ALIŞ ($)</span><span class="price-val">${(finalPrice - asset.spread/2).toFixed(0)} $</span></div>
                <div class="price-box"><span class="price-label">SATIŞ ($)</span><span class="price-val" style="color:var(--accent)">${(finalPrice + asset.spread/2).toFixed(0)} $</span></div>
                <div class="chg-badge up-bg">▲ %${(Math.random()*2).toFixed(2)}</div>
            </div>`;
        }).join('');

        document.getElementById('connStatus').innerHTML = "🟢 SİSTEM AKTİF";
    } catch (e) {
        document.getElementById('connStatus').innerHTML = "⚠️ YEDEK MOD";
    }
}

setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(updateData, 30000);
updateData();

document.getElementById('themeToggle').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeToggle').innerText = t === 'dark' ? '☀️ AÇIK' : '🌙 KOYU';
};
</script>
</body>
</html>
