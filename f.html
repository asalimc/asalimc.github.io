<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASC CAFÉ | Brazil Trade Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #f8fafc;
            --accent: #fbbf24; --border: #334155;
            --up-bg: #22c55e; --up-text: #000;
            --down-bg: #ef4444; --down-text: #fff;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        
        /* PC Tam Ekran Yapısı */
        body, html { height: 100vh; margin: 0; padding: 0; overflow: hidden; background: var(--bg); color: var(--primary); }
        body { display: flex; flex-direction: column; padding: clamp(5px, 1.5vh, 15px); }
        .container { max-width: 1800px; height: 100%; display: flex; flex-direction: column; margin: 0 auto; width: 100%; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 2px solid var(--accent); margin-bottom: 8px; flex-shrink: 0; }
        .header h1 { font-size: clamp(16px, 2.2vw, 24px); font-weight: 800; margin: 0; }
        .header h1 span { color: var(--accent); }

        .market-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
        .m-card { background: var(--card); padding: clamp(8px, 1.5vh, 15px); border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .m-card.trend-up { background: var(--up-bg); color: var(--up-text); }
        .m-card.trend-down { background: var(--down-bg); color: var(--down-text); }
        .m-card label { display: block; font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .m-card .val { font-family: 'JetBrains Mono'; font-size: clamp(16px, 2vw, 22px); font-weight: 700; display: block; }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 10px; flex-grow: 1; overflow: hidden; }
        .p-card { background: var(--card); border-radius: 12px; padding: clamp(10px, 2vh, 20px); border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; }
        
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 8px; }
        .btn-qty { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--primary); padding: 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .btn-qty:hover { background: var(--accent); color: var(--bg); }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .input-group { background: rgba(15, 23, 42, 0.5); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 9px; color: var(--accent); font-weight: 800; margin-bottom: 4px; }
        .input-group input { width: 100%; border: none; background: transparent; font-size: 18px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; color: white; }

        .price-list { font-size: 12px; }
        .price-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .amt b { display: block; font-family: 'JetBrains Mono'; text-align: right; }
        .amt .usd { font-size: 13px; color: var(--primary); }
        .amt .try { font-size: 10px; color: var(--success); }

        .sell-box { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--accent); padding: 10px; border-radius: 8px; text-align: center; margin-top: 5px; }
        .sell-box div { font-size: 24px; font-family: 'JetBrains Mono'; font-weight: 700; color: var(--accent); }

        .btn-pdf { width: 100%; background: var(--accent); color: var(--bg); border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 13px; margin-top: 8px; }

        #pdf-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; overflow-y:auto; }
        .modal-body { background: white; max-width: 850px; margin: 10px auto; border-radius: 8px; position: relative; }

        @media (max-width: 768px) { body, html { overflow-y: auto; height: auto; } .market-grid { grid-template-columns: 1fr 1fr; } .main-grid { overflow: visible; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ASC CAFÉ <span>BRAZIL TERMINAL</span></h1>
        <div id="clock" style="font-family:'JetBrains Mono'; font-size: 12px; color:var(--accent);"></div>
    </div>

    <div class="market-grid">
        <div class="m-card" id="m-try"><label>USD/TRY</label><span class="val">44.92</span></div>
        <div class="m-card" id="m-brl"><label>USD/BRL</label><span class="val">4.98</span></div>
        <div class="m-card" id="m-ny"><label>NY ARABICA</label><span class="val">301.50</span></div>
        <div class="m-card" id="m-ldn"><label>LDN ROBUSTA</label><span class="val">3567</span></div>
    </div>

    <div class="main-grid" id="main-grid"></div>
</div>

<div id="pdf-modal">
    <div class="modal-body">
        <div style="background:#1e293b; padding:10px; display:flex; justify-content:space-between; position:sticky; top:0; z-index:10;">
            <button onclick="closePdf()" style="padding:8px 15px; background:#475569; color:white; border:none; cursor:pointer; border-radius:4px;">KAPAT</button>
            <button id="download-pdf" style="padding:8px 15px; background:var(--accent); color:#000; border:none; cursor:pointer; font-weight:bold; border-radius:4px;">RESMİ PDF İNDİR</button>
        </div>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
let DATA = { try: 44.92, brl: 4.98, ny: 301.50, ldn: 3567 };
const ITEMS = [
    { id: 'mi', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', type: 'NY', diff: 25 },
    { id: 'sa', name: 'BRAZIL SANTOS NY2/3 17/18', type: 'NY', diff: 20 },
    { id: 'co', name: 'BRAZIL CONILON (ROBUSTA)', type: 'LDN', diff: 150 }
];
const COSTS = { ocean: 220, inland: 190, port: 160, tax: 0.10 };

function init() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = ITEMS.map(item => `
        <div class="p-card">
            <h2 style="font-size:12px; margin:0 0 10px 0; border-left:3px solid var(--accent); padding-left:8px; line-height:1.2;">${item.name}</h2>
            <div class="btn-row">
                <button class="btn-qty" onclick="updateQty('${item.id}', 1)">1T</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 19.2)">20'FT</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 27)">40'FT</button>
            </div>
            <div class="inputs">
                <div class="input-group"><label>KÂR (%)</label><input type="number" id="k_${item.id}" value="0" oninput="calc('${item.id}')"></div>
                <div class="input-group"><label>MİKTAR (MT)</label><input type="number" id="t_${item.id}" value="19.2" oninput="calc('${item.id}')"></div>
            </div>
            <div id="res_${item.id}" class="price-list"></div>
            <div class="sell-box"><label style="font-size:9px; font-weight:800; color:var(--accent);">TEKLİF BİRİM FİYAT (KG)</label><div id="sell_${item.id}">$ 0.00</div></div>
            <button class="btn-pdf" onclick="openPdf('${item.id}')">TEKLİF HAZIRLA</button>
        </div>
    `).join('');
    calcAll();
    setInterval(marketTick, 3000);
}

function marketTick() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
    const key = Object.keys(DATA)[Math.floor(Math.random()*4)];
    const change = (Math.random() - 0.5) * 0.4;
    DATA[key] += change;
    const el = document.getElementById(`m-${key}`);
    el.querySelector('.val').innerText = DATA[key].toFixed(2);
    el.classList.remove('trend-up', 'trend-down');
    void el.offsetWidth;
    el.classList.add(change > 0 ? 'trend-up' : 'trend-down');
    calcAll();
}

function updateQty(id, val) { document.getElementById(`t_${id}`).value = val; calc(id); }

function calc(id) {
    const item = ITEMS.find(x => x.id === id);
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    const fob = base + COSTS.port;
    const cif = fob + COSTS.ocean;
    const ddpBase = (cif + COSTS.inland) * (1 + COSTS.tax);
    const sellKg = (ddpBase * (1 + margin)) / 1000;
    
    const fmt = (n) => Math.round(n).toLocaleString('tr-TR');
    document.getElementById(`res_${id}`).innerHTML = `
        <div class="price-item"><span>FOB (Brazil Port)</span><div class="amt"><b class="usd">$ ${fmt(fob)}</b><b class="try">₺ ${fmt(fob * DATA.try)}</b></div></div>
        <div class="price-item"><span>CIF (Entry Port)</span><div class="amt"><b class="usd">$ ${fmt(cif)}</b><b class="try">₺ ${fmt(cif * DATA.try)}</b></div></div>
        <div class="price-item"><span>DDP (Warehouse)</span><div class="amt"><b class="usd">$ ${fmt(ddpBase)}</b><b class="try">₺ ${fmt(ddpBase * DATA.try)}</b></div></div>
    `;
    document.getElementById(`sell_${id}`).innerText = `$ ${sellKg.toFixed(2)}`;
}

function calcAll() { ITEMS.forEach(i => calc(i.id)); }

function openPdf(id) {
    const client = prompt("Müşteri Ünvanı:");
    if(!client) return;
    const item = ITEMS.find(x => x.id === id);
    const ton = parseFloat(document.getElementById(`t_${id}`).value);
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    const fob = base + COSTS.port;
    const cif = fob + COSTS.ocean;
    const ddpBase = (cif + COSTS.inland) * (1 + COSTS.tax);
    
    // Matematiksel Senkronizasyon
    const unitPriceKg = parseFloat(((ddpBase * (1 + margin)) / 1000).toFixed(2));
    const ddpTonWithMargin = unitPriceKg * 1000;
    const grandTotalUsd = unitPriceKg * ton * 1000;
    
    const fmt = (n) => Math.round(n).toLocaleString('tr-TR');

    const html = `
        <div style="padding:40px; background:#fff; color:#001a4d; font-family:'Plus Jakarta Sans', sans-serif; min-height:1050px;">
            <div style="border-bottom:5px solid #001a4d; padding-bottom:20px; margin-bottom:30px; display:flex; justify-content:space-between; align-items:center;">
                <div><h1 style="margin:0; font-size:32px; letter-spacing:-1px;">ASC CAFÉ GLOBAL</h1><p style="margin:5px 0; font-weight:800; color:#fbbf24; font-size:14px;">INTERNATIONAL TRADING TERMINAL</p></div>
                <div style="text-align:right; font-size:11px;"><b>Ref No:</b> ASC-${Date.now()}<br><b>Tarih:</b> ${new Date().toLocaleString('tr-TR')}<br><b>Origin:</b> BRAZIL</div>
            </div>
            
            <div style="background:#f8fafc; border-left:6px solid #001a4d; padding:20px; margin-bottom:30px;">
                <p style="margin:0; font-size:11px; color:#64748b; font-weight:800;">PROPOSAL PREPARED FOR</p>
                <h2 style="margin:5px 0; font-size:24px;">${client.toUpperCase()}</h2>
                <p style="margin:0; font-weight:700;">COMMODITY: ${item.name}</p>
            </div>

            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                <thead>
                    <tr style="background:#001a4d; color:#fff; font-size:12px;">
                        <th style="padding:18px; text-align:left;">INCOTERMS (DELIVERY TERMS)</th>
                        <th style="padding:18px; text-align:right;">UNIT PRICE (TON/USD)</th>
                        <th style="padding:18px; text-align:right;">UNIT PRICE (TON/TRY)</th>
                    </tr>
                </thead>
                <tbody style="font-size:14px;">
                    <tr><td style="padding:18px; border-bottom:1px solid #e2e8f0;"><b>FOB</b> - Free On Board (Brazil Port)</td><td style="padding:18px; border-bottom:1px solid #e2e8f0; text-align:right; font-family:'JetBrains Mono';">$ ${fmt(fob)}</td><td style="padding:18px; border-bottom:1px solid #e2e8f0; text-align:right; color:#16a34a; font-family:'JetBrains Mono';">₺ ${fmt(fob * DATA.try)}</td></tr>
                    <tr><td style="padding:18px; border-bottom:1px solid #e2e8f0;"><b>CIF</b> - Cost, Insurance & Freight (Entry Port)</td><td style="padding:18px; border-bottom:1px solid #e2e8f0; text-align:right; font-family:'JetBrains Mono';">$ ${fmt(cif)}</td><td style="padding:18px; border-bottom:1px solid #e2e8f0; text-align:right; color:#16a34a; font-family:'JetBrains Mono';">₺ ${fmt(cif * DATA.try)}</td></tr>
                    <tr style="background:#fffbeb;"><td style="padding:18px; border-bottom:2px solid #001a4d;"><b>DDP</b> - Delivered Duty Paid (Warehouse)</td><td style="padding:18px; border-bottom:2px solid #001a4d; text-align:right; font-weight:800; font-family:'JetBrains Mono'; color:#c2410c;">$ ${fmt(ddpTonWithMargin)}</td><td style="padding:18px; border-bottom:2px solid #001a4d; text-align:right; font-weight:800; font-family:'JetBrains Mono'; color:#16a34a;">₺ ${fmt(ddpTonWithMargin * DATA.try)}</td></tr>
                </tbody>
            </table>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:40px 0;">
                <div style="background:#001a4d; color:#fff; padding:30px; border-radius:12px; text-align:center; border-bottom:6px solid #fbbf24;">
                    <p style="margin:0; font-size:12px; opacity:0.8; font-weight:800;">OFFERED UNIT PRICE (KG/DDP)</p>
                    <h3 style="margin:10px 0 0 0; font-size:36px; color:#fbbf24; font-family:'JetBrains Mono';">$ ${unitPriceKg.toFixed(2)}</h3>
                </div>
                <div style="background:#fbbf24; color:#001a4d; padding:30px; border-radius:12px; text-align:center; border-bottom:6px solid #001a4d;">
                    <p style="margin:0; font-size:12px; font-weight:800;">GRAND TOTAL AMOUNT (${ton} MT)</p>
                    <h3 style="margin:10px 0 0 0; font-size:36px; font-family:'JetBrains Mono';">$ ${fmt(grandTotalUsd)}</h3>
                </div>
            </div>

            <div style="margin-top:40px; padding:25px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; font-size:11px; line-height:1.8; color:#475569;">
                <h4 style="margin:0 0 10px 0; color:#001a4d; border-bottom:1px solid #cbd5e1; padding-bottom:5px;">INTERNATIONAL TRADING CLAUSES</h4>
                <b>1. FOB:</b> Risk and costs transfer to buyer once loaded onto the vessel in Brazil.<br>
                <b>2. CIF:</b> Seller pays for freight and insurance to the named port of destination.<br>
                <b>3. DDP:</b> Seller delivers the goods to the buyer, cleared for import, and all duties/taxes paid.<br>
                <b>4. VALIDITY:</b> This proposal is valid for 24 hours due to international market volatility (NY/LDN Exchange).
            </div>
            
            <div style="margin-top:80px; display:flex; justify-content:space-between; text-align:center;">
                <div style="border-top:2px solid #001a4d; width:240px; padding-top:15px; font-size:12px;"><b>ASC CAFÉ GLOBAL</b><br>Authorized Export Department</div>
                <div style="border-top:2px solid #001a4d; width:240px; padding-top:15px; font-size:12px;"><b>ACCEPTED BY</b><br>${client.toUpperCase()}</div>
            </div>
        </div>
    `;
    document.getElementById('pdf-content').innerHTML = html;
    document.getElementById('pdf-modal').style.display = 'block';
    document.getElementById('download-pdf').onclick = () => {
        const opt = { margin:0, filename:`ASC_OFFER_${client.replace(/\s+/g, '_')}.pdf`, html2canvas:{scale:2, useCORS: true}, jsPDF:{unit:'in', format:'letter', orientation: 'portrait'} };
        html2pdf().set(opt).from(document.getElementById('pdf-content')).save().then(closePdf);
    };
}
function closePdf() { document.getElementById('pdf-modal').style.display = 'none'; }
window.onload = init;
</script>
</body>
</html>
