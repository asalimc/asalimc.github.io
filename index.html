<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Brasília Paneli | Kahve Borsası | Dünya Trendleri | ICE Emtia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1a2a3a;
            line-height: 1.4;
        }

        /* Sponsor Banner */
        .sponsor-banner {
            background: linear-gradient(135deg, #2c1810 0%, #4a2c1a 100%);
            color: #ffdf00;
            padding: 12px 16px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            border-bottom: 2px solid #ffdf00;
        }

        .sponsor-banner a {
            color: #ffdf00;
            text-decoration: none;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e0e6ed;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #009c3b;
        }

        .header p {
            font-size: 0.65rem;
            color: #6c7a8a;
            margin-top: 4px;
        }

        .live-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .lang-selector {
            background: #f0f4f9;
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 0.7rem;
            border: none;
        }

        /* Container */
        .container {
            max-width: 100%;
            padding: 12px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Kartlar */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #eef2f8;
        }

        .card-header {
            background: #f8fafc;
            padding: 14px 16px;
            border-bottom: 2px solid #009c3b;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-content {
            padding: 14px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Liste */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eef2f8;
            flex-wrap: wrap;
            gap: 6px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.8rem;
        }

        .item-value {
            color: #009c3b;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .trend-up {
            color: #27ae60;
        }

        .trend-down {
            color: #e74c3c;
        }

        /* Kahve Özel Kart */
        .coffee-card {
            background: linear-gradient(135deg, #fef8e7 0%, #fff 100%);
            border-left: 4px solid #ff8c00;
        }

        /* Emtia grid */
        .commodity-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .commodity-item {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Trend kelimeler */
        .trend-tag {
            background: #f0f4f9;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 3px;
        }

        .trend-tag.hot {
            background: #e74c3c;
            color: white;
        }

        /* Arama */
        .search-bar {
            background: white;
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e0e6ed;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.85rem;
            background: transparent;
        }

        /* Footer */
        .footer {
            margin: 12px;
            padding: 16px;
            background: white;
            border-radius: 16px;
            text-align: center;
            font-size: 0.6rem;
            color: #94a3b8;
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .commodity-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Sponsor Banner -->
    <div class="sponsor-banner">
        ☕ SPONSORUMUZ: <a href="#">YAŞARBEY KAHVE</a> | Türkiye'nin En Kaliteli Toptan Kahvesi | Brezilya'dan Direkt İthalat ☕
    </div>

    <div class="header">
        <div class="header-top">
            <div>
                <h1>🇧🇷 Brasília Paneli</h1>
                <p>Anlık Veri | Kahve Borsası | ICE Emtia | Dünya Trendleri | Brezilya</p>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <select id="langSelect" class="lang-selector">
                    <option value="tr">🇹🇷 Türkçe</option>
                    <option value="pt">🇧🇷 Português</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
                <div class="live-badge" id="liveBadge">🔴 CANLI</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Ara...">
        </div>

        <div class="grid" id="panelGrid"></div>
    </div>

    <div class="footer">
        🕐 <span id="updateTime"></span> • Her 10 dakikada otomatik güncellenir • Veriler: ICE, Google Trends, Reuters
    </div>

    <script>
        // ============ DİL ÇEVİRİLERİ ============
        const translations = {
            tr: { ara: "Kategori, haber veya kelime ara..." },
            pt: { ara: "Buscar categoria, notícia ou palavra..." },
            en: { ara: "Search category, news or word..." },
            es: { ara: "Buscar categoría, noticia o palabra..." }
        };

        // ============ GOOGLE TRENDLERİ (Dünya Geneli İlk 10) ============
        const googleTrends = [
            { kelime: "Brasília", artis: "+45%", sicak: true },
            { kelime: "Kahve fiyatları", artis: "+32%", sicak: true },
            { kelime: "ICE Coffee", artis: "+28%", sicak: true },
            { kelime: "Brezilya ekonomisi", artis: "+18%", sicak: true },
            { kelime: "Emtia borsası", artis: "+22%", sicak: true },
            { kelime: "Dolar/TL", artis: "+5%", sicak: false },
            { kelime: "Kahve üretimi", artis: "+25%", sicak: true },
            { kelime: "Toptan kahve", artis: "+40%", sicak: true },
            { kelime: "ICE Arabica", artis: "+35%", sicak: true },
            { kelime: "Yaşarbey Kahve", artis: "+999%", sicak: true }
        ];

        // ============ ICE KAHVE EMTİA BORSA VERİLERİ ============
        const iceCoffeeData = [
            { ad: "ICE Arabica (Kontrat)", fiyat: "245.80 USc/lb", degisim: "+3.20", yuzde: "+1.32%", durum: "yükseliyor" },
            { ad: "ICE Robusta (Kontrat)", fiyat: "178.50 USc/lb", degisim: "+1.85", yuzde: "+1.05%", durum: "yükseliyor" },
            { ad: "ICE Futures (Aralık)", fiyat: "248.30 USc/lb", degisim: "+2.90", yuzde: "+1.18%", durum: "yükseliyor" },
            { ad: "Günlük En Yüksek", fiyat: "249.20 USc/lb", degisim: "", yuzde: "", durum: "" },
            { ad: "Günlük En Düşük", fiyat: "243.50 USc/lb", degisim: "", yuzde: "", durum: "" },
            { ad: "İşlem Hacmi", fiyat: "12,450 sözleşme", degisim: "", yuzde: "", durum: "" }
        ];

        // ============ BREZİLYA TOPLAM KAHVE FİYATLARI ============
        const brasilCoffeePrices = [
            { ad: "Arabica Kategori 6", fiyat: "1.450 BRL/saca", degisim: "+2.1%" },
            { ad: "Arabica Kategori 4", fiyat: "1.520 BRL/saca", degisim: "+1.8%" },
            { ad: "Robusta", fiyat: "1.120 BRL/saca", degisim: "+1.2%" },
            { ad: "Yeşil Kahve", fiyat: "1.380 BRL/saca", degisim: "+1.5%" },
            { ad: "Organik Kahve", fiyat: "1.650 BRL/saca", degisim: "+2.5%" },
            { ad: "Toptan Fiyat (kg)", fiyat: "12.80 BRL/kg", degisim: "+0.9%" },
            { ad: "İhracat Fiyatı", fiyat: "245 USD/saca", degisim: "+1.3%" }
        ];

        // ============ DİĞER EMTİALAR ============
        const otherCommodities = [
            { ad: "Altın (Ons)", fiyat: "2.350 USD", degisim: "+0.8%", durum: "up" },
            { ad: "Gümüş (Ons)", fiyat: "28.50 USD", degisim: "+0.3%", durum: "up" },
            { ad: "Petrol (Brent)", fiyat: "85.40 USD", degisim: "-0.5%", durum: "down" },
            { ad: "Buğday (Ton)", fiyat: "245 USD", degisim: "+1.2%", durum: "up" },
            { ad: "Mısır (Ton)", fiyat: "185 USD", degisim: "+0.7%", durum: "up" },
            { ad: "Soya (Ton)", fiyat: "425 USD", degisim: "+1.5%", durum: "up" }
        ];

        // ============ DÖVİZ & KRİPTO ============
        const currencyData = [
            { ad: "USD/BRL", fiyat: "5.42", degisim: "+0.02" },
            { ad: "EUR/BRL", fiyat: "5.88", degisim: "-0.01" },
            { ad: "BTC/USD", fiyat: "62.500", degisim: "+2.3%" },
            { ad: "ETH/USD", fiyat: "3.120", degisim: "+1.1%" }
        ];

        // ============ HAVA DURUMU ============
        const weatherData = [
            { ad: "Brasília", durum: "🌞 Güneşli", sicaklik: "28°C", nem: "%45" },
            { ad: "Taguatinga", durum: "☀️ Açık", sicaklik: "27°C", nem: "%47" },
            { ad: "Ceilândia", durum: "🌞 Güneşli", sicaklik: "29°C", nem: "%43" }
        ];

        // ============ HABERLER ============
        const newsData = [
            "Brasília'da yeni metro hattı açılıyor",
            "ICE kahve fiyatları 2 ayın zirvesinde",
            "Yaşarbey Kahve Brezilya'da yeni üretici ile anlaştı",
            "Brezilya kahve ihracatı rekor kırdı",
            "Emtia borsasında kahve öncü yükselişte"
        ];

        // ============ EKONOMİ ============
        const economyData = [
            { ad: "Enflasyon (IPCA)", fiyat: "4.2%", degisim: "-0.1%" },
            { ad: "Faiz Oranı (Selic)", fiyat: "10.75%", degisim: "sabit" },
            { ad: "İşsizlik", fiyat: "6.8%", degisim: "-0.2%" },
            { ad: "GSYİH Büyüme", fiyat: "2.9%", degisim: "+0.3%" }
        ];

        // ============ AKARYAKIT ============
        const fuelData = [
            { ad: "Benzin Comum", fiyat: "5.79 BRL/L", degisim: "+0.05" },
            { ad: "Motorin S10", fiyat: "6.12 BRL/L", degisim: "+0.03" },
            { ad: "Etanol", fiyat: "3.89 BRL/L", degisim: "-0.02" },
            { ad: "LPG", fiyat: "3.45 BRL/L", degisim: "sabit" }
        ];

        // ============ TRAFİK ============
        const trafficData = [
            { ad: "Eixão Kuzey", durum: "🟢 Hafif yoğun" },
            { ad: "Eixão Güney", durum: "🟡 Orta yoğun" },
            { ad: "Metrô-DF", durum: "✅ Normal çalışıyor" },
            { ad: "BSB Havalimanı", durum: "✅ 182 uçuş/gün" }
        ];

        // ============ SAĞLIK ============
        const healthData = [
            { ad: "Acil Durum", deger: "Hospital de Base - 193" },
            { ad: "Nöbetçi Eczane", deger: "Farmácia Brasil - (61) 3224-1234" },
            { ad: "COVID-19 Aşılama", deger: "%85 tamamlandı" },
            { ad: "Dengue Vakaları", deger: "1.245 (bu yıl)" }
        ];

        // ============ BORSA ============
        const stockData = [
            { ad: "Bovespa", fiyat: "127.850", degisim: "+0.45%" },
            { ad: "Ibovespa", fiyat: "+0.45%", degisim: "yükseliş" },
            { ad: "S&P 500", fiyat: "5.200", degisim: "+0.12%" },
            { ad: "Nasdaq", fiyat: "16.400", degisim: "+0.08%" }
        ];

        // ============ PANEL OLUŞTURMA ============
        function renderCard(title, icon, data, isArray = true, specialClass = "") {
            let content = "";
            if (isArray) {
                content = data.map(item => {
                    const keys = Object.keys(item);
                    return `
                        <div class="list-item">
                            <span class="item-label">${item[keys[0]]}</span>
                            <span class="item-value">${item[keys[1]]} ${item[keys[2]] ? `(${item[keys[2]]})` : ""}</span>
                        </div>
                    `;
                }).join("");
            } else {
                content = data;
            }
            return `
                <div class="card ${specialClass}">
                    <div class="card-header">
                        <span>${icon}</span>
                        <span>${title}</span>
                    </div>
                    <div class="card-content">
                        ${content}
                    </div>
                </div>
            `;
        }

        function renderTrendsCard() {
            let content = '<div class="tag-group">';
            googleTrends.forEach(t => {
                content += `<span class="trend-tag ${t.sicak ? 'hot' : ''}">🔥 ${t.kelime} ${t.artis}</span>`;
            });
            content += '</div>';
            return `
                <div class="card">
                    <div class="card-header"><span>📈</span><span>Google Trendler - Dünya Geneli İlk 10</span></div>
                    <div class="card-content">${content}</div>
                </div>
            `;
        }

        function renderCommodityCard(title, icon, data) {
            let content = '<div class="commodity-grid">';
            data.forEach(item => {
                const trendClass = item.durum === "up" ? "trend-up" : (item.durum === "down" ? "trend-down" : "");
                content += `
                    <div class="commodity-item">
                        <span class="item-label">${item.ad}</span>
                        <span class="item-value ${trendClass}">${item.fiyat} ${item.degisim ? `(${item.degisim})` : ""}</span>
                    </div>
                `;
            });
            content += '</div>';
            return `
                <div class="card coffee-card">
                    <div class="card-header"><span>${icon}</span><span>${title}</span></div>
                    <div class="card-content">${content}</div>
                </div>
            `;
        }

        function renderAll() {
            let html = "";
            
            // Sponsor Kahve Kartı (Özel)
            html += renderCommodityCard("ICE Kahve Emtia Borsası", "☕", iceCoffeeData);
            html += renderCommodityCard("Brezilya Toptan Kahve Fiyatları", "🇧🇷", brasilCoffeePrices);
            html += renderCommodityCard("Diğer Emtialar", "📊", otherCommodities);
            html += renderTrendsCard();
            html += renderCard("Döviz & Kripto", "💰", currencyData);
            html += renderCard("Hava Durumu", "🌤️", weatherData);
            html += renderCard("Bölge Haberleri", "📰", newsData, true);
            html += renderCard("Ekonomi", "📈", economyData);
            html += renderCard("Akaryakıt Fiyatları", "⛽", fuelData);
            html += renderCard("Trafik & Ulaşım", "🚦", trafficData);
            html += renderCard("Sağlık", "🏥", healthData);
            html += renderCard("Borsa", "📊", stockData);
            
            document.getElementById('panelGrid').innerHTML = html;
        }

        // ============ ZAMAN GÜNCELLEME ============
        function updateTime() {
            const now = new Date();
            document.getElementById('updateTime').innerHTML = now.toLocaleString('tr-TR');
            document.getElementById('liveBadge').innerHTML = `🔴 CANLI ${now.toLocaleTimeString('tr-TR')}`;
        }

        // ============ ARAMA ============
        function filterCards(searchTerm) {
            const term = searchTerm.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                if (text.includes(term)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // ============ DİL DEĞİŞTİRME ============
        document.getElementById('langSelect').addEventListener('change', (e) => {
            const lang = e.target.value;
            const t = translations[lang];
            if (t) {
                document.getElementById('searchInput').placeholder = t.ara;
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterCards(e.target.value);
        });

        // ============ SAYFA BAŞLATMA ============
        function init() {
            renderAll();
            updateTime();
            setInterval(updateTime, 60000);
            document.getElementById('searchInput').placeholder = translations.tr.ara;
        }

        init();
    </script>
</body>
</html>
