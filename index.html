<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO SISTEMA DE GESTÃO V16.2</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --navy: #0f172a; --yellow: #fbbf24; --white: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; }
        * { font-style: normal !important; }
        
        .main-view { height: calc(100vh - 145px); overflow-y: auto; padding: 1rem; padding-bottom: 5rem; }
        nav { position: fixed !important; bottom: 0 !important; left: 0; right: 0; display: flex !important; visibility: visible !important; opacity: 1 !important; z-index: 9999; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pos-grid { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; }
        .pos-card { flex: 0 0 140px; background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 12px; transition: 0.2s; cursor: pointer; }
        .btn-yellow { background-color: var(--yellow); color: var(--navy); font-weight: 800; }
        .bg-navy { background-color: var(--navy); }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 30px; max-height: 90vh; overflow-y: auto; }
        .nav-active { color: var(--yellow) !important; border-top: 3px solid var(--yellow); }

        .excel-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .excel-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; color: #64748b; text-transform: uppercase; }
        .excel-table td { padding: 8px; border: 1px solid #e2e8f0; vertical-align: middle; white-space: nowrap; }
        
        .filter-btn { padding: 6px 12px; border-radius: 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; transition: 0.2s; background: white; }
        .filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    </style>
</head>
<body>

    <header class="h-16 bg-navy text-white px-6 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center text-navy font-black shadow-lg shadow-amber-500/20">PRO</div>
            <div>
                <h1 id="brand-name" class="font-bold text-sm leading-none tracking-tight uppercase">GESTÃO</h1>
                <span class="text-[9px] text-amber-400 uppercase font-black tracking-widest">SBO v16.2</span>
            </div>
        </div>
        <div id="live-clock" class="text-xs font-bold"></div>
    </header>

    <main class="main-view no-scrollbar" id="app-content">
        <div id="view-pos" class="h-full flex flex-col gap-4">
            <div class="bg-navy rounded-[35px] p-6 text-white shadow-2xl flex flex-col shrink-0 min-h-[300px]">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                    <select id="cart-customer-select" class="bg-transparent text-xs font-bold border-none outline-none text-amber-400 max-w-[200px]"></select>
                    <button onclick="clearCart()" class="text-[10px] text-red-400 font-bold uppercase">Limpar</button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 no-scrollbar mb-4"></div>
                <div class="pt-4 border-t border-slate-800 flex justify-between items-end">
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Total a Pagar</p>
                        <h3 id="cart-total" class="text-4xl font-black text-amber-400">R$ 0,00</h3>
                    </div>
                    <button onclick="openPaymentModal()" class="btn-yellow px-8 py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm uppercase">Finalizar Venda</button>
                </div>
            </div>
            <div class="flex-1">
                <input type="text" id="pos-search" oninput="renderPos()" placeholder="Buscar..." class="w-full p-4 rounded-2xl border-none ring-2 ring-slate-100 outline-none focus:ring-amber-400 mb-2 shadow-sm">
                <div id="pos-products" class="pos-grid no-scrollbar"></div>
            </div>
        </div>

        <div id="view-stock" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black">Estoque</h2>
                <button onclick="openProductModal()" class="btn-yellow px-4 py-2 rounded-xl text-xs uppercase">+ Novo</button>
            </div>
            <div id="stock-list" class="grid grid-cols-1 gap-2 pb-10"></div>
        </div>

        <div id="view-customers" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black">Clientes</h2>
                <button onclick="openContactModal('customer')" class="btn-yellow px-4 py-2 rounded-xl text-xs uppercase">+ Novo</button>
            </div>
            <div id="customer-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 pb-10"></div>
        </div>

        <div id="view-suppliers" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black">Toptancılar</h2>
                <button onclick="openContactModal('supplier')" class="btn-yellow px-4 py-2 rounded-xl text-xs uppercase">+ Novo</button>
            </div>
            <div id="supplier-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 pb-10"></div>
        </div>

        <div id="view-finance" class="hidden space-y-6">
            <div class="space-y-4">
                <h2 class="text-xl font-black">Lista de Vendas</h2>
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="renderFinance('all')" class="filter-btn active" id="f-all">Todas</button>
                    <button onclick="renderFinance('Cartão')" class="filter-btn" id="f-card">Cartão</button>
                    <button onclick="renderFinance('Dinheiro')" class="filter-btn" id="f-cash">Dinheiro</button>
                    <button onclick="renderFinance('Pix')" class="filter-btn" id="f-pix">Pix</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-green-500">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Faturamento</p>
                    <h3 id="fin-income" class="text-xl font-black text-navy">R$ 0,00</h3>
                </div>
                <div class="bg-navy p-5 rounded-3xl shadow-sm text-white border-l-4 border-amber-400">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Lucro Líquido SBO</p>
                    <h3 id="fin-profit" class="text-xl font-black text-amber-400">R$ 0,00</h3>
                </div>
            </div>
            <div class="bg-white rounded-[30px] shadow-sm border overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th>NOME</th><th>PREÇO</th><th>TIPO</th><th>DATA</th><th>TOTAL</th><th>LUCRO</th>
                            </tr>
                        </thead>
                        <tbody id="sales-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <h2 class="text-xl font-black">Ajuste</h2>
            <div class="bg-white p-6 rounded-[35px] shadow-sm border space-y-4">
                <input type="text" id="set-company" placeholder="Empresa" class="w-full p-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="set-profit-rate" placeholder="Comissão %" class="w-full p-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100">
                    <input type="text" value="3.09" readonly class="w-full p-3 bg-slate-200 rounded-xl font-bold text-slate-500">
                </div>
                <button onclick="saveSettings()" class="btn-yellow w-full py-4 rounded-2xl uppercase shadow-md">Salvar Configurações</button>
                
                <div class="pt-4 border-t border-dashed space-y-3">
                    <p class="text-[10px] font-bold text-slate-400 uppercase text-center">Backup Google Drive</p>
                    <button onclick="backupSystem()" class="w-full py-3 bg-navy text-white rounded-2xl text-xs font-bold uppercase"><i class="fas fa-cloud-download-alt mr-2"></i>Sistemi Yedekle (Json)</button>
                    <button onclick="document.getElementById('restore-file').click()" class="w-full py-3 bg-slate-100 text-navy rounded-2xl text-xs font-bold uppercase"><i class="fas fa-cloud-upload-alt mr-2"></i>Yedekten Geri Yükle</button>
                    <input type="file" id="restore-file" class="hidden" accept=".json" onchange="restoreSystem(event)">
                </div>
            </div>
        </div>
    </main>

    <nav class="bg-white border-t items-center justify-around px-2 pb-safe shadow-2xl h-20">
        <button onclick="switchTab('pos')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-pos"><i class="fas fa-cash-register text-xl"></i><span class="text-[8px] font-black uppercase">Venda</span></button>
        <button onclick="switchTab('stock')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-stock"><i class="fas fa-boxes text-xl"></i><span class="text-[8px] font-black uppercase">Estoque</span></button>
        <button onclick="switchTab('customers')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-customers"><i class="fas fa-users text-xl"></i><span class="text-[8px] font-black uppercase">Clientes</span></button>
        <button onclick="switchTab('suppliers')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-suppliers"><i class="fas fa-truck-loading text-xl"></i><span class="text-[8px] font-black uppercase">Toptancı</span></button>
        <button onclick="switchTab('finance')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-finance"><i class="fas fa-chart-line text-xl"></i><span class="text-[8px] font-black uppercase">Finança</span></button>
        <button onclick="switchTab('settings')" class="flex flex-col items-center gap-1 text-slate-400 nav-btn" id="n-settings"><i class="fas fa-cog text-xl"></i><span class="text-[8px] font-black uppercase">Ajuste</span></button>
    </nav>

    <div id="modal-product" class="modal-bg">
        <div class="modal-content p-6">
            <h3 class="text-xl font-black mb-4 uppercase">Gestão de Produto</h3>
            <div class="space-y-4">
                <input type="hidden" id="p-id">
                <select id="p-cat" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100 font-bold uppercase text-navy">
                    <option value="Colar">Colar</option><option value="Brinco">Brinco</option><option value="Pulseira">Pulseira</option><option value="Anel">Anel</option><option value="Outros">Outros</option>
                </select>
                <input type="text" id="p-sku" placeholder="SKU/REF" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <input type="text" id="p-name" placeholder="Nome" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="p-cost" placeholder="Custo" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-l-4 border-red-400">
                    <input type="number" id="p-price" placeholder="Venda" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-l-4 border-green-400">
                </div>
                <input type="number" id="p-stock" placeholder="Quantidade" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <button onclick="saveProduct()" class="btn-yellow w-full py-4 rounded-2xl uppercase shadow-lg">Gravar</button>
                <button id="btn-delete-product" onclick="deleteProduct()" class="hidden w-full py-2 text-red-500 font-bold text-[10px] uppercase">Apagar Produto</button>
                <button onclick="closeModal('modal-product')" class="w-full text-[10px] font-bold text-slate-400">VOLTAR</button>
            </div>
        </div>
    </div>

    <div id="modal-payment" class="modal-bg">
        <div class="modal-content p-8 text-center">
            <h3 class="text-2xl font-black mb-6 text-navy uppercase">Tipo de Pagamento</h3>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="finishSale('Dinheiro')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2"><i class="fas fa-money-bill-wave text-green-500"></i><b class="text-[10px]">DINHEIRO</b></button>
                <button onclick="finishSale('Cartão')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2"><i class="fas fa-credit-card text-blue-500"></i><b class="text-[10px]">CARTÃO</b></button>
                <button onclick="finishSale('Pix')" class="p-4 rounded-2xl border-2 flex flex-col items-center gap-2"><i class="fas fa-bolt text-purple-500"></i><b class="text-[10px]">PIX</b></button>
            </div>
            <button onclick="closeModal('modal-payment')" class="mt-6 text-slate-400 font-bold uppercase text-[10px]">Cancelar</button>
        </div>
    </div>

    <div id="modal-contact" class="modal-bg">
        <div class="modal-content p-6">
            <h3 id="c-modal-title" class="text-xl font-black mb-4 uppercase">Cadastro</h3>
            <div class="space-y-4">
                <input type="hidden" id="c-id"><input type="hidden" id="c-type">
                <button onclick="pickFromContacts()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-blue-500/20"><i class="fas fa-address-book mr-2"></i>REHBERDEN BİLGİ AL</button>
                <input type="text" id="c-name" placeholder="Nome Completo" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <input type="text" id="c-phone" placeholder="Telefone" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100">
                <button onclick="saveContact()" class="btn-yellow w-full py-4 rounded-2xl uppercase">Gravar</button>
                <button onclick="closeModal('modal-contact')" class="w-full text-[10px] font-bold text-slate-400">VOLTAR</button>
            </div>
        </div>
    </div>

    <script>
        const db = new Dexie("PRO_SBO_V16_2_DRIVE_SYNC");
        db.version(1).stores({
            products: "++id, sku, name, price, cost, stock, category",
            contacts: "++id, name, phone, type",
            sales: "++id, date, method, total, profit",
            config: "id, val"
        });

        let cart = [];
        let config = { company: 'SBO GESTÃO', currency: 'R$', lowStock: 5, profitRate: 30, cardFee: 3.09 };

        async function init() {
            await loadConfig();
            switchTab('pos');
            setInterval(() => document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR'), 1000);
        }

        async function loadConfig() {
            const res = await db.config.toArray();
            res.forEach(c => config[c.id] = c.val);
            config.cardFee = 3.09;
            document.getElementById('brand-name').innerText = config.company || 'SBO GESTÃO';
            document.getElementById('set-company').value = config.company || '';
            document.getElementById('set-profit-rate').value = config.profitRate || 30;
            
            const custs = await db.contacts.where('type').equals('customer').toArray();
            document.getElementById('cart-customer-select').innerHTML = '<option value="0">Venda Rápida</option>' + custs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('n-' + tab).classList.add('nav-active');
            if(tab === 'pos') renderPos();
            if(tab === 'stock') renderStock();
            if(tab === 'customers') renderContactList('customer');
            if(tab === 'suppliers') renderContactList('supplier');
            if(tab === 'finance') renderFinance('all');
        }

        async function pickFromContacts() {
            try {
                if (!('contacts' in navigator)) return alert('Dispositivo não suporta.');
                const props = ['name', 'tel'];
                const contacts = await navigator.contacts.select(props, { multiple: false });
                if (contacts.length) {
                    if (contacts[0].name) document.getElementById('c-name').value = contacts[0].name[0];
                    if (contacts[0].tel) document.getElementById('c-phone').value = contacts[0].tel[0];
                }
            } catch (e) { console.error(e); }
        }

        async function renderStock() {
            const prods = await db.products.toArray();
            document.getElementById('stock-list').innerHTML = prods.map(p => `
                <div onclick="openProductModal(${p.id})" class="bg-white p-4 rounded-3xl border flex items-center justify-between active:scale-95 transition-all">
                    <div class="flex flex-col"><span class="text-[8px] font-black text-amber-500 uppercase">${p.category}</span><h4 class="font-bold text-xs uppercase text-navy">${p.name}</h4><p class="text-[10px] text-slate-400 font-bold">Preço: ${p.price.toFixed(2)}</p></div>
                    <div class="text-right px-4 font-black ${p.stock <= config.lowStock ? 'text-red-500' : 'text-navy'}">${p.stock} Un.</div>
                </div>
            `).join('');
        }

        function openProductModal(id = null) {
            if(id) {
                db.products.get(id).then(p => {
                    document.getElementById('p-id').value = p.id; document.getElementById('p-sku').value = p.sku;
                    document.getElementById('p-name').value = p.name; document.getElementById('p-price').value = p.price;
                    document.getElementById('p-cost').value = p.cost; document.getElementById('p-stock').value = p.stock;
                    document.getElementById('p-cat').value = p.category;
                    document.getElementById('btn-delete-product').classList.remove('hidden');
                });
            } else {
                document.getElementById('p-id').value = ""; document.getElementById('p-sku').value = "REF-" + Date.now().toString().slice(-4);
                document.getElementById('p-name').value = ""; document.getElementById('p-price').value = ""; 
                document.getElementById('p-cost').value = ""; document.getElementById('p-stock').value = "0";
                document.getElementById('btn-delete-product').classList.add('hidden');
            }
            openModal('modal-product');
        }

        async function saveProduct() {
            const id = document.getElementById('p-id').value;
            const data = {
                sku: document.getElementById('p-sku').value, name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value) || 0, cost: parseFloat(document.getElementById('p-cost').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0, category: document.getElementById('p-cat').value
            };
            if(id) await db.products.update(parseInt(id), data); else await db.products.add(data);
            closeModal('modal-product'); renderStock();
        }

        async function deleteProduct() {
            const id = document.getElementById('p-id').value;
            if(id && confirm('Apagar este produto?')) { await db.products.delete(parseInt(id)); closeModal('modal-product'); renderStock(); }
        }

        async function renderPos() {
            const query = document.getElementById('pos-search').value.toLowerCase();
            const prods = await db.products.toArray();
            document.getElementById('pos-products').innerHTML = prods.filter(p => p.name.toLowerCase().includes(query)).map(p => `
                <div onclick="addToCart(${p.id})" class="pos-card shadow-sm"><span class="text-[8px] font-bold text-slate-400">${p.category}</span><h4 class="text-[10px] font-black truncate text-navy uppercase">${p.name}</h4><p class="text-[10px] font-black text-amber-500">R$ ${p.price.toFixed(2)}</p></div>
            `).join('');
        }

        function addToCart(id) {
            db.products.get(id).then(p => {
                if(p.stock <= 0) return alert('Sem Estoque!');
                const item = cart.find(x => x.id === id);
                if(item) item.cQty++; else cart.push({...p, cQty: 1});
                renderCart();
            });
        }

        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map((it, i) => `<div class="flex items-center justify-between bg-white/5 p-2 rounded-xl"><div><h5 class="text-[10px] font-bold uppercase">${it.name}</h5><p class="text-[9px] text-amber-400">${it.cQty}x R$ ${it.price.toFixed(2)}</p></div><button onclick="cart.splice(${i},1);renderCart()" class="text-red-400 text-xs font-bold">X</button></div>`).join('');
            const total = cart.reduce((s, x) => s + (x.price * x.cQty), 0);
            document.getElementById('cart-total').innerText = "R$ " + total.toFixed(2);
        }

        function openPaymentModal() { if(cart.length) openModal('modal-payment'); }

        async function finishSale(method) {
            const total = cart.reduce((s, x) => s + (x.price * x.cQty), 0);
            const myRate = (parseFloat(config.profitRate) / 100);
            const bankRate = (3.09 / 100);
            
            let myPart = total * myRate;
            let profit = (method === 'Cartão') ? (myPart - (total * bankRate)) : myPart;

            const sale = { 
                date: new Date().toISOString(), method: method, total: total, profit: profit, 
                items: JSON.parse(JSON.stringify(cart)) 
            };
            
            for(let it of cart) await db.products.update(it.id, { stock: it.stock - it.cQty });
            await db.sales.add(sale);
            cart = []; renderCart(); closeModal('modal-payment'); alert('Venda Realizada!');
        }

        async function renderFinance(filter = 'all') {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const btnId = filter === 'all' ? 'f-all' : (filter === 'Cartão' ? 'f-card' : (filter === 'Dinheiro' ? 'f-cash' : 'f-pix'));
            document.getElementById(btnId).classList.add('active');

            let sales = await db.sales.toArray();
            if(filter !== 'all') sales = sales.filter(s => s.method === filter);

            document.getElementById('fin-income').innerText = "R$ " + sales.reduce((s, x) => s + x.total, 0).toFixed(2);
            document.getElementById('fin-profit').innerText = "R$ " + sales.reduce((s, x) => s + x.profit, 0).toFixed(2);

            document.getElementById('sales-list-body').innerHTML = sales.reverse().map(s => {
                return s.items.map(it => `
                    <tr>
                        <td class="font-bold uppercase">${it.name}</td>
                        <td>${it.price.toFixed(2)}</td>
                        <td class="text-[9px] font-black">${s.method}</td>
                        <td>${new Date(s.date).toLocaleDateString('pt-BR')}</td>
                        <td class="font-bold">${s.total.toFixed(2)}</td>
                        <td class="text-green-600 font-bold">${s.profit.toFixed(2)}</td>
                    </tr>
                `).join('');
            }).join('');
        }

        async function renderContactList(type) {
            const list = await db.contacts.where('type').equals(type).toArray();
            const target = type === 'customer' ? 'customer-list' : 'supplier-list';
            document.getElementById(target).innerHTML = list.map(c => `
                <div class="bg-white p-4 rounded-3xl border flex justify-between items-center">
                    <div><h4 class="font-bold text-xs uppercase">${c.name}</h4><p class="text-[9px] text-slate-400">${c.phone}</p></div>
                    <button onclick="deleteContact(${c.id}, '${type}')" class="text-red-300"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function openContactModal(type) { document.getElementById('c-type').value = type; document.getElementById('c-name').value = ""; document.getElementById('c-phone').value = ""; openModal('modal-contact'); }
        async function saveContact() {
            const data = { name: document.getElementById('c-name').value, phone: document.getElementById('c-phone').value, type: document.getElementById('c-type').value };
            if(!data.name) return; await db.contacts.add(data); closeModal('modal-contact'); loadConfig(); renderContactList(data.type);
        }
        async function deleteContact(id, type) { if(confirm('Excluir?')) { await db.contacts.delete(id); renderContactList(type); } }
        function openModal(id) { document.getElementById(id).classList.add('modal-active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('modal-active'); }
        function clearCart() { cart = []; renderCart(); }
        async function saveSettings() {
            await db.config.put({id: 'company', val: document.getElementById('set-company').value});
            await db.config.put({id: 'profitRate', val: parseFloat(document.getElementById('set-profit-rate').value)});
            alert('Salvo!'); location.reload();
        }

        // --- BACKUP & RESTORE FONKSİYONLARI ---
        async function backupSystem() {
            const backupData = {
                products: await db.products.toArray(),
                contacts: await db.contacts.toArray(),
                sales: await db.sales.toArray(),
                config: await db.config.toArray(),
                backupDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(backupData)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SBO_GESTAO_YEDEK_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
            a.click();
            alert('Dosya İndirildi! Şimdi bu dosyayı Google Drive klasörüne yükleyebilirsiniz.');
        }

        function restoreSystem(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm('Dikkat! Mevcut tüm veriler silinecek ve yedekteki veriler yüklenecek. Emin misiniz?')) {
                        await db.products.clear(); await db.contacts.clear(); await db.sales.clear(); await db.config.clear();
                        if(data.products) await db.products.bulkAdd(data.products);
                        if(data.contacts) await db.contacts.bulkAdd(data.contacts);
                        if(data.sales) await db.sales.bulkAdd(data.sales);
                        if(data.config) await db.config.bulkPut(data.config);
                        alert('Yedek Başarıyla Yüklendi!');
                        location.reload();
                    }
                } catch(err) { alert('Hata: Geçersiz yedek dosyası!'); }
            };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
