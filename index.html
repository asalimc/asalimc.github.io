<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brasília Live | City Intelligence OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --royal-blue: #0057B7;
            --pure-white: #FFFFFF;
            --snow-bg: #F8FAFC;
            --gold: #FFD700;
            --traffic-green: #22C55E;
            --traffic-red: #EF4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--snow-bg); 
            color: #0F172A; 
            overflow: hidden;
            font-style: normal !important;
        }

        * { font-style: normal !important; }

        /* Fullscreen Mobile Map Map Engine */
        #map-container { 
            height: 100vh; 
            width: 100vw; 
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        #map { height: 100%; width: 100%; background: var(--snow-bg); }

        /* Glassmorphism AR Cards */
        .ar-glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 87, 183, 0.15);
            border-radius: 32px;
        }

        /* Weather Physics Animation */
        @keyframes wind-sway {
            0% { transform: rotate(0deg) translateX(0); }
            50% { transform: rotate(3deg) translateX(5px); }
            100% { transform: rotate(0deg) translateX(0); }
        }
        .weather-icon { animation: wind-sway 4s ease-in-out infinite; }

        /* Traffic Flow Simulation Lines (Canlı Trafik Algısı) */
        .leaflet-interactive { transition: all 0.5s ease; }

        /* Mobile Event Drawer */
        .event-drawer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 45vh;
            z-index: 1000;
            background: white;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(85%);
            transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .event-drawer.open { transform: translateY(0); }

        .drawer-handle {
            width: 40px; height: 5px; background: #E2E8F0;
            border-radius: 10px; margin: 15px auto;
        }

        /* Clean-Tech UI Elements */
        .btn-modern {
            background: var(--royal-blue);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
    </style>
</head>
<body x-data="cityEngine()">

    <nav class="fixed top-6 left-6 right-6 h-16 z-[2000] flex justify-between items-center px-6 ar-glass-card border-none">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[var(--royal-blue)] rounded-xl flex items-center justify-center">
                <i data-lucide="zap" class="text-white w-5 h-5 fill-current"></i>
            </div>
            <h1 class="text-lg font-extrabold tracking-tighter uppercase">Brasília<span class="text-[var(--royal-blue)]">360</span></h1>
        </div>
        
        <div class="hidden md:flex gap-6 items-center">
            <div class="flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                <i data-lucide="wind" class="w-4 h-4 text-[var(--royal-blue)] weather-icon"></i>
                <span class="text-[10px] font-black text-[var(--royal-blue)]">VENTO: 14KM/H (N)</span>
            </div>
            <button class="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Yaşarbey Login</button>
        </div>
    </nav>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <template x-if="activeMonument">
        <div class="fixed top-28 right-6 w-80 z-[1500] ar-glass-card p-6 animate-in fade-in zoom-in duration-300">
            <div class="relative rounded-2xl overflow-hidden h-40 mb-4 shadow-inner">
                <img :src="activeMonument.image" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <span class="absolute bottom-3 left-3 text-white font-black text-xs uppercase tracking-widest">Live AR Preview</span>
            </div>
            <h3 class="text-xl font-black text-slate-900 leading-none" x-text="activeMonument.name"></h3>
            <p class="text-xs text-slate-500 mt-3 font-medium leading-relaxed" x-text="activeMonument.desc"></p>
            <div class="mt-4 flex gap-2">
                <button class="flex-1 bg-[var(--royal-blue)] text-white py-2 rounded-xl text-[10px] font-black uppercase">Visita Virtual</button>
                <button @click="activeMonument = null" class="bg-slate-100 p-2 rounded-xl text-slate-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
        </div>
    </template>

    <div class="fixed bottom-32 left-6 z-[1500] space-y-3">
        <div class="ar-glass-card p-4 flex items-center gap-4 border-l-4 border-[var(--gold)]">
            <div class="w-10 h-10 bg-amber-50 rounded-full flex items-center justify-center text-[var(--gold)]">
                <i data-lucide="coffee"></i>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Yaşarbey Aroma Map</p>
                <p class="text-sm font-black text-slate-800 mt-1">Pontão: 85% Ocupado</p>
            </div>
        </div>
    </div>

    <div class="event-drawer md:hidden" :class="drawerOpen ? 'open' : ''">
        <div @click="drawerOpen = !drawerOpen" class="w-full h-12 flex flex-col items-center">
            <div class="drawer-handle"></div>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Agenda Viva</span>
        </div>
        <div class="p-6 space-y-4 overflow-y-auto h-[calc(45vh-50px)]">
            <template x-for="event in events">
                <div @click="focusEvent(event)" class="flex justify-between items-center border-b border-slate-50 pb-4">
                    <div>
                        <h4 class="font-bold text-slate-900" x-text="event.title"></h4>
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter" x-text="event.location"></p>
                    </div>
                    <span class="text-xs font-black" x-text="event.time"></span>
                </div>
            </template>
        </div>
    </div>

    <script>
        function cityEngine() {
            return {
                drawerOpen: false,
                activeMonument: null,
                events: [
                    { title: 'Show na Concha', time: '20:00', location: 'Setor de Hotéis', coords: [-15.7924, -47.8504] },
                    { title: 'Bienal do Livro', time: '14:00', location: 'Estádio Nacional', coords: [-15.7834, -47.8992] }
                ],
                monuments: [
                    { 
                        name: 'Catedral de Brasília', 
                        desc: 'Uma obra-prima de Niemeyer com 16 colunas de concreto pesando 90 toneladas cada.',
                        image: 'https://images.unsplash.com/photo-1599450012224-345479261a38?auto=format&fit=crop&q=80&w=800',
                        coords: [-15.7982, -47.8755]
                    }
                ],
                
                init() {
                    lucide.createIcons();
                    
                    // Map Initialization
                    this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-15.7938, -47.8828], 13);
                    
                    // OSM & Traffic Overlay Layer
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(this.map);

                    // Traffic Flow Simulation (Visual)
                    this.addTrafficFlow();
                    this.renderPins();
                },

                addTrafficFlow() {
                    // TomTom benzeri trafik akış hatları (Brasília Eixo Monumental)
                    const trafficPaths = [
                        [[-15.7938, -47.8828], [-15.7997, -47.8641]], // Eixo S
                        [[-15.7938, -47.8828], [-15.7834, -47.8992]]  // Eixo N
                    ];
                    
                    trafficPaths.forEach((path, index) => {
                        L.polyline(path, {
                            color: index % 2 === 0 ? 'var(--traffic-green)' : 'var(--traffic-red)',
                            weight: 4,
                            opacity: 0.6,
                            lineCap: 'round'
                        }).addTo(this.map);
                    });
                },

                renderPins() {
                    // Monuments
                    this.monuments.forEach(m => {
                        const icon = L.divIcon({
                            className: 'monu-pin',
                            html: `<div style="background:var(--royal-blue); width:20px; height:20px; border-radius:50%; border:4px solid white; box-shadow:0 0 20px rgba(0,87,183,0.4)"></div>`
                        });
                        L.marker(m.coords, { icon }).addTo(this.map).on('click', () => {
                            this.activeMonument = m;
                            this.map.flyTo(m.coords, 15);
                            setTimeout(() => lucide.createIcons(), 50);
                        });
                    });

                    // Yaşarbey Aroma Map Pins
                    const coffeePos = [-15.8236, -47.8710];
                    L.marker(coffeePos, {
                        icon: L.divIcon({
                            className: 'coffee-pin',
                            html: `<div style="background:var(--gold); width:24px; height:24px; border-radius:10px; display:flex; align-items:center; justify-center; border:3px solid white; box-shadow:0 0 15px rgba(255,215,0,0.5)">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>
                                   </div>`
                        })
                    }).addTo(this.map).bindPopup("<b class='font-black'>Yaşarbey Kahve - Pontão</b><br>O aroma que respira na cidade.");
                },

                focusEvent(ev) {
                    this.map.flyTo(ev.coords, 16);
                    this.drawerOpen = false;
                }
            }
        }
    </script>
</body>
</html>
