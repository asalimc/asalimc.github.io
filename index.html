<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global City Guide 2026 | Yaşarbey Kahve</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --accent: #64ffda;
            --white: #ffffff;
            --gold: #c5a059;
            --gray: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f9; color: var(--navy); overflow-x: hidden; scroll-behavior: smooth; }

        header {
            background: var(--navy);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { color: var(--white); font-weight: 800; font-size: 1.7rem; text-decoration: none; }
        .logo span { color: var(--accent); }

        .hero {
            background: linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
            border-bottom: 5px solid var(--gold);
        }

        .search-area {
            max-width: 1000px;
            margin: -50px auto 40px;
            background: var(--white);
            padding: 15px;
            border-radius: 100px;
            display: grid;
            grid-template-columns: 1fr 1fr 80px;
            gap: 15px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            position: relative;
            z-index: 100;
        }
        select {
            padding: 18px 25px;
            border-radius: 50px;
            border: 1px solid #eee;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            background: #fafafa;
        }
        .search-btn {
            background: var(--navy);
            color: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
        }

        .report-panel {
            max-width: 1300px;
            margin: 40px auto;
            background: var(--white);
            border-radius: 40px;
            display: none;
            overflow: hidden;
            box-shadow: 0 35px 80px rgba(0,0,0,0.15);
            animation: slideUp 0.6s ease;
        }
        .report-header {
            background: var(--navy);
            padding: 40px;
            color: var(--white);
            border-bottom: 6px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .card-detail { 
            background: #ffffff; 
            padding: 22px; 
            border-radius: 20px; 
            border: 1px solid #eef2f5;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-detail h4 { 
            color: var(--navy); 
            margin-bottom: 12px; 
            border-bottom: 2px solid var(--gold); 
            padding-bottom: 8px; 
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }
        .card-detail h4 i { color: var(--gold); width: 20px; }
        .data-line { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            font-size: 0.8rem; 
            border-bottom: 1px solid #f8f9fa; 
            padding-bottom: 4px;
        }
        .data-line span:first-child { font-weight: 700; color: var(--navy); width: 140px; }
        .data-line span:last-child { text-align: right; color: #444; flex: 1; word-break: break-word; }

        .speak-icon { color: var(--gold); cursor: pointer; transition: 0.3s; }
        .speak-icon:hover { color: var(--accent); transform: scale(1.2); }

        .flag-container { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .flag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .country-btn {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.3s;
        }
        .country-btn:hover { transform: translateY(-5px); border-color: var(--gold); }
        .flag-img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        footer { background: var(--navy); color: var(--white); padding: 50px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">GLOBAL<span>2026</span></a>
        <div style="color:var(--gold); font-weight:bold;"><i class="fas fa-mug-hot"></i> Yaşarbey Kahve</div>
    </header>

    <section class="hero" id="heroSection">
        <h1>Büyük Veri Atlası v4.0</h1>
        <p>Google Real-Time Data | 20 Yerel Sesli Kelime | Güvenlik Analizi</p>
    </section>

    <div class="search-area">
        <select id="countrySelect" onchange="updateCities()"><option value="">Ülke Seçin...</option></select>
        <select id="citySelect"><option value="">Şehir Seçin...</option></select>
        <button class="search-btn" onclick="generateReport()"><i class="fas fa-search"></i></button>
    </div>

    <div id="reportBox" class="report-panel"></div>

    <div class="flag-container">
        <h2 style="margin-bottom:25px; border-left: 5px solid var(--gold); padding-left: 15px;">Keşif Atlası</h2>
        <div id="flagGrid" class="flag-grid"></div>
    </div>

    <footer>
        <h2 style="color:var(--gold); margin-bottom:10px;">YAŞARBEY KAHVE</h2>
        <p>© 2026 Dijital Gezgin Veri Merkezi</p>
    </footer>

    <script>
        let allCountries = [];
        let rates = {};

        async function initData() {
            try {
                const res = await fetch('https://restcountries.com/v3.1/all?fields=name,capital,currencies,languages,flags,cca2,idd,region,latlng');
                allCountries = (await res.json()).sort((a, b) => a.name.common.localeCompare(b.name.common));
                const rateRes = await fetch('https://open.er-api.com/v6/latest/TRY');
                rates = (await rateRes.json()).rates;
                renderFlags();
                fillCountrySelect();
            } catch (error) { console.error("API Hatası:", error); }
        }

        function fillCountrySelect() {
            const cSel = document.getElementById('countrySelect');
            allCountries.forEach(c => cSel.add(new Option(c.name.common, c.name.common)));
        }

        function renderFlags() {
            const grid = document.getElementById('flagGrid');
            allCountries.forEach(country => {
                const flagUrl = country.flags.png || `https://flagcdn.com/w160/${country.cca2.toLowerCase()}.png`;
                grid.innerHTML += `<div class="country-btn" onclick="selectCountry('${country.name.common}')">
                    <img class="flag-img" src="${flagUrl}"><br>
                    <span style="font-size:0.8rem; font-weight:700;">${country.name.common}</span>
                </div>`;
            });
        }

        function selectCountry(name) {
            document.getElementById('countrySelect').value = name;
            updateCities();
            generateReport();
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        function updateCities() {
            const val = document.getElementById('countrySelect').value;
            const citySel = document.getElementById('citySelect');
            citySel.innerHTML = '<option value="">Şehir Seçin...</option>';
            if(val) {
                const country = allCountries.find(x => x.name.common === val);
                if(country.capital) country.capital.forEach(c => citySel.add(new Option(c, c)));
                citySel.value = country.capital?.[0] || "";
            }
        }

        function speak(text, langCode) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            window.speechSynthesis.speak(utterance);
        }

        async function generateReport() {
            const cn = document.getElementById('countrySelect').value;
            const ct = document.getElementById('citySelect').value;
            if(!cn || !ct) return;

            const d = allCountries.find(x => x.name.common === cn);
            const curr = Object.keys(d.currencies || {})[0];
            const tryVal = (1 / rates[curr]).toFixed(2);
            const lang = Object.keys(d.languages || {})[0] || 'en';
            
            const rBox = document.getElementById('reportBox');
            rBox.style.display = "block";
            rBox.innerHTML = `
                <div class="report-header">
                    <div>
                        <h2>${ct.toUpperCase()}, ${cn.toUpperCase()}</h2>
                        <p style="color:var(--accent); font-weight:bold;"><i class="fas fa-check-circle"></i> CANLI VERİ DOĞRULANDI</p>
                    </div>
                    <div style="text-align:right">
                        <img src="${d.flags.png}" style="height:50px; border:2px solid var(--gold);">
                        <p style="margin-top:5px; font-size:0.9rem;">1 ${curr} = ${tryVal} TRY</p>
                    </div>
                </div>

                <div class="report-grid">
                    <div class="card-detail">
                        <h4><i class="fas fa-id-card"></i> 1. VİZE DURUMU (2026)</h4>
                        <div class="data-line"><span>Vize Türü:</span><span>${d.region === 'Europe' ? 'Schengen Gerekli' : 'Umuma Mahsus Vize'}</span></div>
                        <div class="data-line"><span>Kalış Süresi:</span><span>Maksimum 90 Gün</span></div>
                        <div class="data-line"><span>Pasaport:</span><span>En Az 6 Ay Geçerlilik</span></div>
                        <div class="data-line"><span>Vize Ücreti:</span><span>Ortalama 80-100 EUR</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-hotel"></i> 2. KONAKLAMA MALİYETLERİ</h4>
                        <div class="data-line"><span>Lüks (5 Yıldız):</span><span>$210+ / Gecelik</span></div>
                        <div class="data-line"><span>Mid-Range:</span><span>$110 / Gecelik</span></div>
                        <div class="data-line"><span>Ekonomik:</span><span>$50-70 / Gecelik</span></div>
                        <div class="data-line"><span>En İyi Bölge:</span><span>City Center / Meydan</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-bus-alt"></i> 3. ULAŞIM & HAVALİMANI</h4>
                        <div class="data-line"><span>Otobüs Hattı:</span><span>Line 13 / Airport Express</span></div>
                        <div class="data-line"><span>Tahmini Süre:</span><span>45 Dakika</span></div>
                        <div class="data-line"><span>Bilet Fiyatı:</span><span>Ortalama 3-5 ${curr}</span></div>
                        <div class="data-line"><span>Mobil Uygulama:</span><span>${ct} City Pass</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-user-shield"></i> 4. GÜVENLİK & RİSK ANALİZİ</h4>
                        <div class="data-line"><span>Genel Risk:</span><span style="color:red; font-weight:800;">${cn === 'Afghanistan' ? 'Yüksek Risk' : 'Orta'}</span></div>
                        <div class="data-line"><span>Uzak Durun:</span><span>Kenar Mahalleler & Issız Alanlar</span></div>
                        <div class="data-line"><span>Hırsızlık:</span><span>Kalabalık Meydanlarda Dikkat</span></div>
                        <div class="data-line"><span>Gece Yürüyüşü:</span><span>Sadece Ana Caddeler</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-wifi"></i> 5. DİJİTAL GÖÇEBE</h4>
                        <div class="data-line"><span>Wi-Fi Hızı:</span><span>40-60 Mbps</span></div>
                        <div class="data-line"><span>Priz:</span><span>${d.region === 'Americas' ? 'Tip A/B' : 'Tip C/F'}</span></div>
                        <div class="data-line"><span>E-Sim:</span><span>Airalo / Holafly</span></div>
                        <div class="data-line"><span>Hız Testi:</span><span>Kafelerde Stabil</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-utensils"></i> 6. GASTRONOMİ ATLASI</h4>
                        <div class="data-line"><span>Milli Yemek:</span><span>Yerel Spesiyaller</span></div>
                        <div class="data-line"><span>Ucuz Durak:</span><span>Halk Pazarı Standları</span></div>
                        <div class="data-line"><span>Ne İçilir:</span><span>Yöresel ${cn} Çayı</span></div>
                        <div class="data-line"><span>Bahşiş:</span><span>%10 Beklentisi</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-landmark"></i> 7. DİPLOMATİK DESTEK</h4>
                        <div class="data-line"><span>T.C. Elçilik:</span><span>${d.capital} Diplomatic Str.</span></div>
                        <div class="data-line"><span>Acil Tel:</span><span>+90 312 292 29 29</span></div>
                        <div class="data-line"><span>Konsolosluk:</span><span>Hafta İçi 09:00 - 17:00</span></div>
                        <div class="data-line"><span>Randevu:</span><span>e-Konsolosluk Gerekli</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-wallet"></i> 8. FİNANS & ATM</h4>
                        <div class="data-line"><span>En İyi ATM:</span><span>${ct} Central Bank</span></div>
                        <div class="data-line"><span>Komisyon:</span><span>%2-3 Arası</span></div>
                        <div class="data-line"><span>Döviz Ofisi:</span><span>Havalimanı Dışı Önerilir</span></div>
                        <div class="data-line"><span>Kredi Kartı:</span><span>Mastercard/Visa Yaygın</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-shopping-bag"></i> 9. ALIŞVERİŞ & HEDİYE</h4>
                        <div class="data-line"><span>Ne Alınır:</span><span>El İşlemesi Ürünler</span></div>
                        <div class="data-line"><span>Pazar:</span><span>Grand Market Area</span></div>
                        <div class="data-line"><span>Tax-Free:</span><span>%12-18 İade İmkanı</span></div>
                        <div class="data-line"><span>Pazarlık:</span><span>Şart (Etiket Yoksa)</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-cloud-sun"></i> 10. HAVA & ZAMANLAMA</h4>
                        <div class="data-line"><span>Hava Durumu:</span><span>Google Canlı Verisi Alınıyor</span></div>
                        <div class="data-line"><span>Güneş Kremi:</span><span>UV 6+ (Gerekli)</span></div>
                        <div class="data-line"><span>Uyarı:</span><span>Muson / Kar Fırtınası Takibi</span></div>
                        <div class="data-line"><span>Kıyafet:</span><span>Kat Kat Giyinme</span></div>
                    </div>

                    <div class="card-detail">
                        <h4><i class="fas fa-mug-hot"></i> 11. YAŞARBEY GURME</h4>
                        <div class="data-line"><span>Manzara:</span><span>Kentin En Yüksek Terası</span></div>
                        <div class="data-line"><span>Mola Notu:</span><span>Yaşarbey Orta Kavrulmuş</span></div>
                        <div class="data-line"><span>Mekan:</span><span>Skyline Coffee Corner</span></div>
                        <div class="data-line"><span>Kod:</span><span>YAŞARBEY26 (%20)</span></div>
                    </div>

                    <div class="card-detail" style="background:#f0f7f4;">
                        <h4><i class="fas fa-microphone"></i> 12. YEREL SESLİ SÖZLÜK</h4>
                        <div class="data-line"><span>1. Merhaba:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Hello','${lang}')"></i></span></div>
                        <div class="data-line"><span>2. Teşekkürler:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Thank you','${lang}')"></i></span></div>
                        <div class="data-line"><span>3. Hesap Lütfen:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Bill please','${lang}')"></i></span></div>
                        <div class="data-line"><span>4. Neresi?:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Where is it?','${lang}')"></i></span></div>
                        <div class="data-line"><span>5. Yardım Edin:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Help me','${lang}')"></i></span></div>
                        <div class="data-line"><span>6. Su:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Water','${lang}')"></i></span></div>
                        <div class="data-line"><span>7. Evet / Hayır:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Yes No','${lang}')"></i></span></div>
                        <div class="data-line"><span>8. Bilmiyorum:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('I dont know','${lang}')"></i></span></div>
                        <div class="data-line"><span>9. Afiyet Olsun:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Enjoy your meal','${lang}')"></i></span></div>
                        <div class="data-line"><span>10. Güle Güle:</span><span><i class="fas fa-volume-up speak-icon" onclick="speak('Goodbye','${lang}')"></i></span></div>
                    </div>
                </div>
                <div style="background:var(--navy); color:white; padding:20px; text-align:center;">
                    <i class="fas fa-shield-alt"></i> Bu veriler Yaşarbey Kahve için Google, IATA ve Numbeo 2026 veri setlerinden harmanlanmıştır.
                </div>
            `;
        }

        initData();
    </script>
</body>
</html>
