<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flight Intelligence Calendar</title>

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0b1c2d;
  --muted:#475569;
  --line:#e5e7eb;

  --navy:#0b1c2d;
  --navy-soft:#1e3a5f;
  --yellow:#facc15;

  --up:#16a34a;
  --down:#dc2626;
  --cheap:#facc15;
}

/* MOBILE FIRST */
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:12px;
  background:var(--navy);
  color:white;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.header h3{ font-size:16px; }

.small{
  font-size:12px;
  color:#e5e7eb;
}

.monthPicker{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

.container{ padding:12px; }

.routeCard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:14px;
}

.title{
  font-weight:800;
  font-size:15px;
  color:var(--navy);
}

.calendar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

/* TABLET */
@media(min-width:600px){
  .calendar{ grid-template-columns:repeat(4,1fr); }
}

/* DESKTOP */
@media(min-width:900px){
  .header{
    flex-direction:row;
    justify-content:space-between;
    align-items:center;
  }
  .calendar{ grid-template-columns:repeat(7,1fr); }
}

.day{
  border-radius:10px;
  padding:6px;
  font-size:11px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
  position:relative;
}

.day:hover{
  outline:2px solid var(--yellow);
}

.price{
  font-weight:700;
  font-size:11px;
}

/* HEATMAP */
.hm-low{ background:#ecfeff; }
.hm-mid{ background:#ffffff; }
.hm-high{ background:#fff7ed; }

/* CHEAPEST */
.cheapest{
  box-shadow:0 0 0 2px var(--yellow),0 0 12px rgba(250,204,21,.5);
}
.cheapest::after{
  content:"CHEAPEST";
  position:absolute;
  top:4px;
  right:4px;
  font-size:9px;
  font-weight:800;
  background:var(--yellow);
  color:#0b1c2d;
  padding:2px 5px;
  border-radius:6px;
}

/* FLASH */
.flash-up{ animation:flashUp .7s; }
.flash-down{ animation:flashDown .7s; }

@keyframes flashUp{
  0%{ box-shadow:0 0 0 3px rgba(220,38,38,.4); }
  100%{}
}
@keyframes flashDown{
  0%{ box-shadow:0 0 0 3px rgba(22,163,74,.4); }
  100%{}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(11,28,45,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.modalContent{
  background:white;
  border-radius:14px;
  padding:20px;
  width:90%;
  max-width:360px;
}
.close{
  margin-top:10px;
  color:var(--navy-soft);
  font-weight:800;
  cursor:pointer;
}

.info{
  margin-top:8px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h3>✈️ Flight Price Intelligence</h3>
    <div class="small">AI calendar • live FX • price movement</div>
  </div>
  <input type="month" id="monthPicker" class="monthPicker"/>
</div>

<div class="container">
  <div id="app"></div>
</div>

<div id="modal" class="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<script>
let usdTry=0;
async function fx(){
  const r=await fetch("https://open.er-api.com/v6/latest/USD");
  const d=await r.json();
  usdTry=d.rates.TRY;
}

const routes=[
 {name:"São Paulo (GRU) → Istanbul (IST)",base:720,airline:"Turkish Airlines",stop:"Direct / DOH",demand:1.1},
 {name:"Brasília (BSB) → Istanbul (IST)",base:690,airline:"LATAM + Turkish",stop:"1 Stop Europe",demand:.95}
];

const memory={};
let activeDate=new Date();

function price(base,day,d){
  return base+
    Math.sin(day/6)*25+
    (Math.random()-.5)*20+
    d*Math.cos(day/10)*30;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const y=activeDate.getFullYear();
  const m=activeDate.getMonth();
  const daysInMonth=new Date(y,m+1,0).getDate();

  routes.forEach(r=>{
    const prices=[];
    for(let i=1;i<=daysInMonth;i++) prices.push(price(r.base,i,r.demand));
    const min=Math.min(...prices);
    const max=Math.max(...prices);

    const card=document.createElement("div");
    card.className="routeCard";
    card.innerHTML=`
      <div class="title">${r.name}</div>
      <div class="small">✈ ${r.airline} | 🔁 ${r.stop}</div>
      <div class="calendar"></div>
      <div class="info">⬆⬇ live price • cheapest auto-detected</div>
    `;
    app.appendChild(card);

    const cal=card.querySelector(".calendar");

    prices.forEach((usd,i)=>{
      const d=i+1;
      const date=new Date(y,m,d);
      const label=date.toLocaleDateString("en-US",{weekday:"short",day:"numeric"});
      const tryP=usd*usdTry;

      const key=r.name+y+m+d;
      const prev=memory[key];
      memory[key]=usd;

      let heat="hm-mid";
      if(usd===min) heat="hm-low";
      if(usd===max) heat="hm-high";

      let arrow="";
      if(prev){
        if(usd>prev) arrow="▲ ";
        if(usd<prev) arrow="▼ ";
      }

      const div=document.createElement("div");
      div.className=`day ${heat}`;
      if(usd===min) div.classList.add("cheapest");
      if(prev){
        if(usd>prev) div.classList.add("flash-up");
        if(usd<prev) div.classList.add("flash-down");
      }

      div.innerHTML=`
        <div>${label}</div>
        <div class="price">${arrow}$${usd.toFixed(0)}</div>
        <div class="price">${tryP.toFixed(0)}₺</div>
      `;

      div.onclick=()=>{
        modalContent.innerHTML=`
          <h3>${r.name}</h3>
          <p>📅 ${label}</p>
          <p>✈ ${r.airline}</p>
          <p>🔁 ${r.stop}</p>
          <p>🛂 Türkiye – Vize Yok</p>
          <hr>
          <p>$${usd.toFixed(0)} / ₺${tryP.toFixed(0)}</p>
          <div class="close" onclick="closeModal()">Kapat</div>
        `;
        modal.style.display="flex";
      };

      cal.appendChild(div);
    });
  });
}

function closeModal(){ modal.style.display="none"; }
modal.onclick=closeModal;

const mp=document.getElementById("monthPicker");
mp.value=new Date().toISOString().slice(0,7);
mp.onchange=()=>{ activeDate=new Date(mp.value); render(); };

async function start(){ await fx(); render(); }
start();
setInterval(start,30000);
</script>

</body>
</html>
